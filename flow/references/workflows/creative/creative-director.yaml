---
name: creative-director
description: "创意总监工作流：策略→创意→执行→审核→品牌"

daily:
  - skill: /create
    trigger: "把控创意方向、审核作品、指导团队"
    output: "创意日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪创意趋势、竞品、文化"
    output: "创意情报"
    time: "15min"
  - skill: /mark
    trigger: "标记创意亮点、问题、方向"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "创意策略"
    flow:
      - skill: /analyze
        step: "1. 品牌分析"
        output: "品牌分析"
        time: "2h"
      - skill: /create
        step: "2. 创意策略"
        output: "创意策略"
        time: "3h"
      - skill: /pitch
        step: "3. 策略汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

  - name: "创意执行"
    flow:
      - skill: /create
        step: "1. 创意概念"
        output: "创意概念"
        time: "3h"
      - skill: /create
        step: "2. 创意方案"
        output: "创意方案"
        time: "3h"
      - skill: /review
        step: "3. 创意审核"
        output: "审核意见"
        time: "1h"
    total: "1-2天"

  - name: "团队管理"
    flow:
      - skill: /interview
        step: "1. 团队沟通"
        output: "沟通记录"
        time: "2h"
      - skill: /analyze
        step: "2. 绩效分析"
        output: "绩效分析"
        time: "2h"
      - skill: /create
        step: "3. 改进方案"
        output: "改进方案"
        time: "2h"
      - skill: /execute
        step: "4. 执行跟进"
        output: "跟进记录"
        time: "持续"
    total: "持续"

  - name: "品牌管理"
    flow:
      - skill: /analyze
        step: "1. 品牌分析"
        output: "品牌分析"
        time: "2h"
      - skill: /create
        step: "2. 品牌策略"
        output: "品牌策略"
        time: "3h"
      - skill: /execute
        step: "3. 品牌执行"
        output: "执行记录"
        time: "持续"
      - skill: /review
        step: "4. 品牌评估"
        output: "评估报告"
        time: "1h"
    total: "持续"

skills:
  - /create
  - /new-info
  - /analyze
  - /pitch
  - /review
  - /interview
  - /execute
  - /mark

output:
  - "品牌分析"
  - "创意策略"
  - "汇报材料"
  - "创意概念"
  - "创意方案"
  - "审核意见"
  - "沟通记录"
  - "绩效分析"
  - "改进方案"
  - "品牌策略"
  - "执行记录"
  - "评估报告"
