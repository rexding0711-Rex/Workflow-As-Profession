---
name: video-producer
description: "视频制片人工作流：策划→脚本→拍摄→后期→发布"

daily:
  - skill: /execute
    trigger: "跟踪拍摄进度、素材、后期"
    output: "制作日报"
    time: "15min"
  - skill: /monitor
    trigger: "监控视频数据、反馈、趋势"
    output: "视频监控"
    time: "10min"
  - skill: /mark
    trigger: "标记制作问题、亮点、改进点"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "视频策划"
    flow:
      - skill: /create
        step: "1. 视频概念"
        output: "视频概念"
        time: "2h"
      - skill: /create
        step: "2. 脚本创作"
        output: "视频脚本"
        time: "3h"
      - skill: /modeling
        step: "3. 预算与排期"
        output: "预算排期"
        time: "2h"
      - skill: /plan
        step: "4. 制作计划"
        output: "制作计划"
        time: "2h"
    total: "1-2天"

  - name: "拍摄制作"
    flow:
      - skill: /execute
        step: "1. 拍摄执行"
        output: "拍摄记录"
        time: "持续"
      - skill: /execute
        step: "2. 素材管理"
        output: "素材管理"
        time: "持续"
      - skill: /execute
        step: "3. 后期制作"
        output: "后期记录"
        time: "持续"
    total: "持续"

  - name: "发布运营"
    flow:
      - skill: /create
        step: "1. 发布文案"
        output: "发布文案"
        time: "1h"
      - skill: /execute
        step: "2. 多平台发布"
        output: "发布记录"
        time: "1h"
      - skill: /monitor
        step: "3. 数据监控"
        output: "监控记录"
        time: "持续"
    total: "半天"

  - name: "数据复盘"
    flow:
      - skill: /analyze
        step: "1. 视频数据分析"
        output: "数据分析"
        time: "2h"
      - skill: /user-research
        step: "2. 观众反馈"
        output: "反馈报告"
        time: "1h"
      - skill: /review
        step: "3. 制作复盘"
        output: "复盘报告"
        time: "1h"
    total: "1天"

skills:
  - /execute
  - /monitor
  - /create
  - /modeling
  - /plan
  - /analyze
  - /user-research
  - /review
  - /mark

output:
  - "视频概念"
  - "视频脚本"
  - "预算排期"
  - "制作计划"
  - "拍摄记录"
  - "素材管理"
  - "后期记录"
  - "发布文案"
  - "数据分析"
  - "反馈报告"
  - "复盘报告"
