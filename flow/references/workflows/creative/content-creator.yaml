---
name: content-creator
description: "内容创作者工作流：选题→创作→编辑→发布→数据"

daily:
  - skill: /new-info
    trigger: "扫描热点、趋势、灵感、竞品内容"
    output: "选题灵感"
    time: "15min"
  - skill: /create
    trigger: "创作内容、脚本、文案"
    output: "内容草稿"
    time: "持续"
  - skill: /mark
    trigger: "标记爆款要素、用户反馈、改进点"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "选题策划"
    flow:
      - skill: /market-search
        step: "1. 热点与趋势搜索"
        output: "热点报告"
        time: "1h"
      - skill: /analyze
        step: "2. 竞品内容分析"
        output: "竞品分析"
        time: "1h"
      - skill: /create
        step: "3. 选题方案"
        output: "选题方案"
        time: "1h"
      - skill: /decide
        step: "4. 选题决策"
        output: "选题决策"
        time: "30min"
    total: "半天"

  - name: "内容创作"
    flow:
      - skill: /create
        step: "1. 内容大纲"
        output: "内容大纲"
        time: "1h"
      - skill: /create
        step: "2. 内容创作"
        output: "内容草稿"
        time: "3h"
      - skill: /create
        step: "3. 视觉素材"
        output: "视觉素材"
        time: "2h"
      - skill: /review
        step: "4. 内容审核"
        output: "审核意见"
        time: "1h"
    total: "1-2天"

  - name: "内容发布"
    flow:
      - skill: /create
        step: "1. 发布文案"
        output: "发布文案"
        time: "1h"
      - skill: /execute
        step: "2. 多平台发布"
        output: "发布记录"
        time: "1h"
      - skill: /monitor
        step: "3. 发布监控"
        output: "监控记录"
        time: "持续"
    total: "半天"

  - name: "数据分析"
    flow:
      - skill: /analyze
        step: "1. 内容数据收集"
        output: "数据收集"
        time: "1h"
      - skill: /analyze
        step: "2. 内容数据分析"
        output: "数据分析"
        time: "2h"
      - skill: /visual
        step: "3. 数据可视化"
        output: "可视化报告"
        time: "1h"
      - skill: /review
        step: "4. 内容复盘"
        output: "复盘报告"
        time: "1h"
    total: "1天"

skills:
  - /new-info
  - /create
  - /market-search
  - /analyze
  - /decide
  - /review
  - /execute
  - /monitor
  - /visual
  - /mark

output:
  - "热点报告"
  - "竞品分析"
  - "选题方案"
  - "内容大纲"
  - "内容草稿"
  - "视觉素材"
  - "发布文案"
  - "发布记录"
  - "数据分析"
  - "可视化报告"
  - "复盘报告"
