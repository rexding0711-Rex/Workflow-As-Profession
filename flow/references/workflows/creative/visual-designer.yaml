---
name: visual-designer
description: "视觉设计师工作流：需求→风格→视觉→规范→走查"

daily:
  - skill: /create
    trigger: "设计视觉、调整风格、维护规范"
    output: "视觉日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪视觉趋势、竞品、技术"
    output: "视觉情报"
    time: "10min"
  - skill: /mark
    trigger: "标记视觉问题、亮点、风格"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "视觉风格"
    flow:
      - skill: /analyze
        step: "1. 风格分析"
        output: "风格分析"
        time: "2h"
      - skill: /create
        step: "2. 风格探索"
        output: "风格探索"
        time: "3h"
      - skill: /visual
        step: "3. 风格板"
        output: "风格板"
        time: "2h"
      - skill: /pitch
        step: "4. 风格汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

  - name: "视觉设计"
    flow:
      - skill: /create
        step: "1. 视觉设计"
        output: "视觉方案"
        time: "3h"
      - skill: /visual
        step: "2. 视觉系统"
        output: "视觉系统"
        time: "2h"
      - skill: /review
        step: "3. 设计评审"
        output: "评审意见"
        time: "1h"
    total: "1-2天"

  - name: "视觉规范"
    flow:
      - skill: /create
        step: "1. 规范文档"
        output: "规范文档"
        time: "3h"
      - skill: /execute
        step: "2. 规范发布"
        output: "发布记录"
        time: "1h"
      - skill: /workshop
        step: "3. 规范培训"
        output: "培训方案"
        time: "2h"
    total: "1-2天"

  - name: "视觉走查"
    flow:
      - skill: /execute
        step: "1. 开发走查"
        output: "走查记录"
        time: "2h"
      - skill: /review
        step: "2. 验收审核"
        output: "验收意见"
        time: "1h"
      - skill: /execute
        step: "3. 问题修复"
        output: "修复记录"
        time: "持续"
    total: "持续"

skills:
  - /create
  - /new-info
  - /analyze
  - /visual
  - /pitch
  - /review
  - /execute
  - /workshop
  - /mark

output:
  - "风格分析"
  - "风格探索"
  - "风格板"
  - "汇报材料"
  - "视觉方案"
  - "视觉系统"
  - "评审意见"
  - "规范文档"
  - "发布记录"
  - "培训方案"
  - "走查记录"
  - "验收意见"
