---
name: editor
description: "编辑工作流：选题→约稿→编辑→校对→发布"

daily:
  - skill: /new-info
    trigger: "扫描行业动态、选题、稿件"
    output: "编辑日报"
    time: "15min"
  - skill: /create
    trigger: "编辑内容、修改、润色"
    output: "编辑稿"
    time: "持续"
  - skill: /mark
    trigger: "标记稿件问题、亮点、改进"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "选题策划"
    flow:
      - skill: /market-search
        step: "1. 热点与趋势"
        output: "热点报告"
        time: "1h"
      - skill: /create
        step: "2. 选题方案"
        output: "选题方案"
        time: "1h"
      - skill: /decide
        step: "3. 选题决策"
        output: "选题决策"
        time: "30min"
    total: "半天"

  - name: "稿件编辑"
    flow:
      - skill: /create
        step: "1. 稿件初审"
        output: "初审意见"
        time: "2h"
      - skill: /create
        step: "2. 稿件编辑"
        output: "编辑稿"
        time: "3h"
      - skill: /review
        step: "3. 稿件校对"
        output: "校对意见"
        time: "2h"
      - skill: /create
        step: "4. 终稿确认"
        output: "终稿"
        time: "1h"
    total: "1-2天"

  - name: "作者管理"
    flow:
      - skill: /interview
        step: "1. 作者沟通"
        output: "沟通记录"
        time: "2h"
      - skill: /analyze
        step: "2. 作者绩效分析"
        output: "绩效分析"
        time: "1h"
      - skill: /create
        step: "3. 作者激励方案"
        output: "激励方案"
        time: "1h"
    total: "半天"

  - name: "发布管理"
    flow:
      - skill: /plan
        step: "1. 发布计划"
        output: "发布计划"
        time: "1h"
      - skill: /execute
        step: "2. 发布执行"
        output: "发布记录"
        time: "1h"
      - skill: /monitor
        step: "3. 发布监控"
        output: "监控记录"
        time: "持续"
      - skill: /review
        step: "4. 发布复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

skills:
  - /new-info
  - /create
  - /market-search
  - /decide
  - /review
  - /interview
  - /analyze
  - /plan
  - /execute
  - /monitor
  - /mark

output:
  - "热点报告"
  - "选题方案"
  - "选题决策"
  - "初审意见"
  - "编辑稿"
  - "校对意见"
  - "终稿"
  - "沟通记录"
  - "绩效分析"
  - "激励方案"
  - "发布计划"
  - "复盘报告"
