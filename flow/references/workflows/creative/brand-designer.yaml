---
name: brand-designer
description: "品牌设计师工作流：策略→视觉→规范→应用→管理"

daily:
  - skill: /create
    trigger: "设计品牌视觉、审核应用、维护规范"
    output: "设计日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪设计趋势、竞品、案例"
    output: "设计情报"
    time: "10min"
  - skill: /mark
    trigger: "标记设计问题、亮点、趋势"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "品牌策略"
    flow:
      - skill: /analyze
        step: "1. 品牌分析"
        output: "品牌分析"
        time: "2h"
      - skill: /create
        step: "2. 视觉策略"
        output: "视觉策略"
        time: "3h"
      - skill: /pitch
        step: "3. 策略汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

  - name: "品牌视觉"
    flow:
      - skill: /create
        step: "1. Logo设计"
        output: "Logo方案"
        time: "3h"
      - skill: /visual
        step: "2. 视觉系统"
        output: "视觉系统"
        time: "3h"
      - skill: /review
        step: "3. 设计评审"
        output: "评审意见"
        time: "1h"
    total: "1-2天"

  - name: "品牌规范"
    flow:
      - skill: /create
        step: "1. 规范文档"
        output: "规范文档"
        time: "3h"
      - skill: /execute
        step: "2. 规范发布"
        output: "发布记录"
        time: "1h"
      - skill: /workshop
        step: "3. 规范培训"
        output: "培训方案"
        time: "2h"
    total: "1-2天"

  - name: "品牌应用"
    flow:
      - skill: /create
        step: "1. 应用设计"
        output: "应用设计"
        time: "3h"
      - skill: /execute
        step: "2. 应用落地"
        output: "落地记录"
        time: "持续"
      - skill: /review
        step: "3. 应用审核"
        output: "审核意见"
        time: "1h"
    total: "持续"

skills:
  - /create
  - /new-info
  - /analyze
  - /visual
  - /pitch
  - /review
  - /execute
  - /workshop
  - /mark

output:
  - "品牌分析"
  - "视觉策略"
  - "汇报材料"
  - "Logo方案"
  - "视觉系统"
  - "评审意见"
  - "规范文档"
  - "发布记录"
  - "培训方案"
  - "应用设计"
  - "落地记录"
  - "审核意见"
