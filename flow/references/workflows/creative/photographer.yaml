---
name: photographer
description: "摄影师工作流：策划→拍摄→后期→交付→版权"

daily:
  - skill: /execute
    trigger: "跟踪拍摄进度、素材、后期"
    output: "拍摄日报"
    time: "10min"
  - skill: /new-info
    trigger: "扫描摄影趋势、技术、灵感"
    output: "摄影灵感"
    time: "10min"
  - skill: /mark
    trigger: "标记拍摄问题、亮点、反馈"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "拍摄策划"
    flow:
      - skill: /create
        step: "1. 拍摄概念"
        output: "拍摄概念"
        time: "2h"
      - skill: /plan
        step: "2. 拍摄计划"
        output: "拍摄计划"
        time: "2h"
      - skill: /modeling
        step: "3. 预算与设备"
        output: "预算方案"
        time: "1h"
    total: "半天"

  - name: "拍摄执行"
    flow:
      - skill: /execute
        step: "1. 拍摄执行"
        output: "拍摄记录"
        time: "持续"
      - skill: /execute
        step: "2. 素材管理"
        output: "素材管理"
        time: "持续"
    total: "拍摄当天"

  - name: "后期处理"
    flow:
      - skill: /create
        step: "1. 选片与修图"
        output: "修图记录"
        time: "3h"
      - skill: /visual
        step: "2. 调色与输出"
        output: "调色方案"
        time: "2h"
      - skill: /review
        step: "3. 成片审核"
        output: "审核意见"
        time: "1h"
    total: "1-2天"

  - name: "版权管理"
    flow:
      - skill: /policy
        step: "1. 版权政策"
        output: "版权政策"
        time: "1h"
      - skill: /execute
        step: "2. 版权登记"
        output: "登记记录"
        time: "1h"
      - skill: /monitor
        step: "3. 版权监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

skills:
  - /execute
  - /new-info
  - /create
  - /plan
  - /modeling
  - /visual
  - /review
  - /policy
  - /monitor
  - /mark

output:
  - "拍摄概念"
  - "拍摄计划"
  - "预算方案"
  - "拍摄记录"
  - "素材管理"
  - "修图记录"
  - "调色方案"
  - "审核意见"
  - "版权政策"
  - "登记记录"
