---
name: cost-control
description: "成本控制工作流：分析→预算→监控→优化→报告"

daily:
  - skill: /analyze
    trigger: "分析成本、监控偏差、预警异常"
    output: "成本日志"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪预算执行、成本趋势"
    output: "成本监控"
    time: "10min"
  - skill: /mark
    trigger: "标记成本问题、节约机会、风险"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "成本分析"
    flow:
      - skill: /analyze
        step: "1. 数据收集"
        output: "数据收集"
        time: "2h"
      - skill: /analyze
        step: "2. 成本分析"
        output: "成本分析"
        time: "3h"
      - skill: /modeling
        step: "3. 成本模型"
        output: "成本模型"
        time: "2h"
      - skill: /visual
        step: "4. 可视化"
        output: "可视化报告"
        time: "2h"
    total: "1-2天"

  - name: "预算管理"
    flow:
      - skill: /plan
        step: "1. 预算编制"
        output: "预算编制"
        time: "3h"
      - skill: /execute
        step: "2. 预算执行"
        output: "执行记录"
        time: "持续"
      - skill: /monitor
        step: "3. 预算监控"
        output: "监控记录"
        time: "持续"
      - skill: /analyze
        step: "4. 偏差分析"
        output: "偏差分析"
        time: "2h"
    total: "持续"

  - name: "成本优化"
    flow:
      - skill: /analyze
        step: "1. 优化分析"
        output: "优化分析"
        time: "2h"
      - skill: /create
        step: "2. 优化方案"
        output: "优化方案"
        time: "2h"
      - skill: /execute
        step: "3. 优化实施"
        output: "实施记录"
        time: "持续"
      - skill: /review
        step: "4. 效果评估"
        output: "评估报告"
        time: "1h"
    total: "持续"

  - name: "成本报告"
    flow:
      - skill: /analyze
        step: "1. 报告分析"
        output: "报告分析"
        time: "2h"
      - skill: /create
        step: "2. 成本报告"
        output: "成本报告"
        time: "2h"
      - skill: /pitch
        step: "3. 报告汇报"
        output: "汇报材料"
        time: "1h"
      - skill: /review
        step: "4. 报告评估"
        output: "评估报告"
        time: "1h"
    total: "1-2天"

skills:
  - /analyze
  - /monitor
  - /plan
  - /execute
  - /modeling
  - /visual
  - /create
  - /pitch
  - /review
  - /mark

output:
  - "数据收集"
  - "成本分析"
  - "成本模型"
  - "可视化报告"
  - "预算编制"
  - "执行记录"
  - "监控记录"
  - "偏差分析"
  - "优化分析"
  - "优化方案"
  - "实施记录"
  - "成本报告"
  - "汇报材料"
