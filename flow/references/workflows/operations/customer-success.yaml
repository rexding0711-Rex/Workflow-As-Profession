---
name: customer-success
description: "客户成功工作流：健康→价值→增长→续约→推广"

daily:
  - skill: /execute
    trigger: "服务客户、处理诉求、推动价值"
    output: "成功日志"
    time: "持续"
  - skill: /monitor
    trigger: "跟踪客户健康、使用、满意度"
    output: "成功监控"
    time: "10min"
  - skill: /mark
    trigger: "标记客户风险、机会、成功"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "客户健康"
    flow:
      - skill: /analyze
        step: "1. 健康分析"
        output: "健康分析"
        time: "2h"
      - skill: /modeling
        step: "2. 健康模型"
        output: "健康模型"
        time: "2h"
      - skill: /monitor
        step: "3. 健康监控"
        output: "监控记录"
        time: "持续"
      - skill: /create
        step: "4. 健康报告"
        output: "健康报告"
        time: "1h"
    total: "持续"

  - name: "价值实现"
    flow:
      - skill: /interview
        step: "1. 需求访谈"
        output: "访谈记录"
        time: "2h"
      - skill: /analyze
        step: "2. 价值分析"
        output: "价值分析"
        time: "2h"
      - skill: /create
        step: "3. 价值方案"
        output: "价值方案"
        time: "2h"
      - skill: /execute
        step: "4. 价值落地"
        output: "落地记录"
        time: "持续"
    total: "持续"

  - name: "续约管理"
    flow:
      - skill: /analyze
        step: "1. 续约预测"
        output: "续约预测"
        time: "2h"
      - skill: /create
        step: "2. 续约方案"
        output: "续约方案"
        time: "2h"
      - skill: /negotiate
        step: "3. 续约谈判"
        output: "谈判记录"
        time: "2h"
      - skill: /execute
        step: "4. 续约执行"
        output: "续约记录"
        time: "持续"
    total: "持续"

  - name: "客户推广"
    flow:
      - skill: /user-research
        step: "1. 案例挖掘"
        output: "案例挖掘"
        time: "2h"
      - skill: /create
        step: "2. 案例包装"
        output: "案例包装"
        time: "2h"
      - skill: /execute
        step: "3. 客户推广"
        output: "推广记录"
        time: "持续"
      - skill: /review
        step: "4. 推广评估"
        output: "评估报告"
        time: "1h"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /modeling
  - /interview
  - /create
  - /negotiate
  - /user-research
  - /review
  - /mark

output:
  - "健康分析"
  - "健康模型"
  - "健康报告"
  - "访谈记录"
  - "价值分析"
  - "价值方案"
  - "续约预测"
  - "续约方案"
  - "谈判记录"
  - "案例挖掘"
  - "案例包装"
  - "推广记录"
  - "评估报告"
