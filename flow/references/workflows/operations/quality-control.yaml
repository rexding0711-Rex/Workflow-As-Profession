---
name: quality-control
description: "质量控制工作流：标准→检验→问题→改进→体系"

daily:
  - skill: /execute
    trigger: "执行检验、记录数据、处理问题"
    output: "质控日志"
    time: "持续"
  - skill: /monitor
    trigger: "跟踪质量指标、异常、趋势"
    output: "质控监控"
    time: "10min"
  - skill: /mark
    trigger: "标记质量问题、风险、改进"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "质量标准"
    flow:
      - skill: /analyze
        step: "1. 标准分析"
        output: "标准分析"
        time: "2h"
      - skill: /policy
        step: "2. 标准制定"
        output: "标准制定"
        time: "2h"
      - skill: /execute
        step: "3. 标准发布"
        output: "发布记录"
        time: "1h"
      - skill: /workshop
        step: "4. 标准培训"
        output: "培训记录"
        time: "2h"
    total: "1-2天"

  - name: "质量检验"
    flow:
      - skill: /process
        step: "1. 检验流程"
        output: "检验流程"
        time: "2h"
      - skill: /execute
        step: "2. 来料检验"
        output: "来料记录"
        time: "持续"
      - skill: /execute
        step: "3. 过程检验"
        output: "过程记录"
        time: "持续"
      - skill: /execute
        step: "4. 出货检验"
        output: "出货记录"
        time: "持续"
    total: "持续"

  - name: "问题处理"
    flow:
      - skill: /analyze
        step: "1. 问题分析"
        output: "问题分析"
        time: "2h"
      - skill: /analyze
        step: "2. 根因分析"
        output: "根因分析"
        time: "2h"
      - skill: /create
        step: "3. 纠正措施"
        output: "纠正措施"
        time: "2h"
      - skill: /execute
        step: "4. 措施验证"
        output: "验证记录"
        time: "2h"
    total: "1-2天"

  - name: "质量改进"
    flow:
      - skill: /analyze
        step: "1. 质量分析"
        output: "质量分析"
        time: "2h"
      - skill: /modeling
        step: "2. 质量模型"
        output: "质量模型"
        time: "2h"
      - skill: /create
        step: "3. 改进方案"
        output: "改进方案"
        time: "2h"
      - skill: /execute
        step: "4. 改进实施"
        output: "实施记录"
        time: "持续"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /policy
  - /process
  - /workshop
  - /create
  - /modeling
  - /mark

output:
  - "标准分析"
  - "标准制定"
  - "培训记录"
  - "检验流程"
  - "来料记录"
  - "过程记录"
  - "出货记录"
  - "问题分析"
  - "根因分析"
  - "纠正措施"
  - "质量分析"
  - "改进方案"
  - "实施记录"
