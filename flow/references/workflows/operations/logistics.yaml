---
name: logistics
description: "物流工作流：运输→仓储→配送→成本→优化"

daily:
  - skill: /execute
    trigger: "调度运输、跟踪货物、处理异常"
    output: "物流日志"
    time: "持续"
  - skill: /monitor
    trigger: "跟踪物流状态、成本、时效"
    output: "物流监控"
    time: "10min"
  - skill: /mark
    trigger: "标记物流问题、延误、优化"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "运输管理"
    flow:
      - skill: /analyze
        step: "1. 运输分析"
        output: "运输分析"
        time: "2h"
      - skill: /execute
        step: "2. 承运商选择"
        output: "承运记录"
        time: "2h"
      - skill: /execute
        step: "3. 运输调度"
        output: "调度记录"
        time: "持续"
      - skill: /monitor
        step: "4. 运输监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

  - name: "仓储管理"
    flow:
      - skill: /analyze
        step: "1. 仓储分析"
        output: "仓储分析"
        time: "2h"
      - skill: /execute
        step: "2. 入库管理"
        output: "入库记录"
        time: "持续"
      - skill: /execute
        step: "3. 出库管理"
        output: "出库记录"
        time: "持续"
      - skill: /execute
        step: "4. 库存管理"
        output: "库存记录"
        time: "持续"
    total: "持续"

  - name: "配送管理"
    flow:
      - skill: /analyze
        step: "1. 配送分析"
        output: "配送分析"
        time: "2h"
      - skill: /execute
        step: "2. 路线规划"
        output: "路线规划"
        time: "2h"
      - skill: /execute
        step: "3. 配送执行"
        output: "配送记录"
        time: "持续"
      - skill: /execute
        step: "4. 签收管理"
        output: "签收记录"
        time: "持续"
    total: "持续"

  - name: "成本优化"
    flow:
      - skill: /analyze
        step: "1. 成本分析"
        output: "成本分析"
        time: "2h"
      - skill: /modeling
        step: "2. 成本模型"
        output: "成本模型"
        time: "2h"
      - skill: /create
        step: "3. 优化方案"
        output: "优化方案"
        time: "2h"
      - skill: /execute
        step: "4. 优化实施"
        output: "实施记录"
        time: "持续"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /modeling
  - /create
  - /mark

output:
  - "运输分析"
  - "承运记录"
  - "调度记录"
  - "仓储分析"
  - "入库记录"
  - "出库记录"
  - "库存记录"
  - "配送分析"
  - "路线规划"
  - "配送记录"
  - "签收记录"
  - "成本分析"
  - "优化方案"
