---
name: inventory-manager
description: "库存经理工作流：计划→采购→仓储→周转→优化"

daily:
  - skill: /execute
    trigger: "管理库存、处理订单、监控周转"
    output: "库存日志"
    time: "持续"
  - skill: /monitor
    trigger: "跟踪库存水平、预警、呆滞"
    output: "库存监控"
    time: "10min"
  - skill: /mark
    trigger: "标记库存问题、优化、风险"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "库存计划"
    flow:
      - skill: /analyze
        step: "1. 需求预测"
        output: "需求预测"
        time: "2h"
      - skill: /modeling
        step: "2. 库存模型"
        output: "库存模型"
        time: "2h"
      - skill: /plan
        step: "3. 采购计划"
        output: "采购计划"
        time: "2h"
      - skill: /create
        step: "4. 计划审核"
        output: "计划审核"
        time: "1h"
    total: "1-2天"

  - name: "采购管理"
    flow:
      - skill: /analyze
        step: "1. 供应商评估"
        output: "供应商评估"
        time: "2h"
      - skill: /execute
        step: "2. 采购执行"
        output: "采购记录"
        time: "持续"
      - skill: /execute
        step: "3. 到货验收"
        output: "验收记录"
        time: "持续"
      - skill: /review
        step: "4. 采购复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

  - name: "仓储管理"
    flow:
      - skill: /execute
        step: "1. 入库管理"
        output: "入库记录"
        time: "持续"
      - skill: /execute
        step: "2. 库内管理"
        output: "库内记录"
        time: "持续"
      - skill: /execute
        step: "3. 出库管理"
        output: "出库记录"
        time: "持续"
      - skill: /analyze
        step: "4. 仓储分析"
        output: "仓储分析"
        time: "2h"
    total: "持续"

  - name: "库存优化"
    flow:
      - skill: /analyze
        step: "1. 周转分析"
        output: "周转分析"
        time: "2h"
      - skill: /analyze
        step: "2. 呆滞分析"
        output: "呆滞分析"
        time: "2h"
      - skill: /create
        step: "3. 优化方案"
        output: "优化方案"
        time: "2h"
      - skill: /execute
        step: "4. 优化实施"
        output: "实施记录"
        time: "持续"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /modeling
  - /plan
  - /create
  - /review
  - /mark

output:
  - "需求预测"
  - "库存模型"
  - "采购计划"
  - "供应商评估"
  - "采购记录"
  - "验收记录"
  - "入库记录"
  - "库内记录"
  - "出库记录"
  - "仓储分析"
  - "周转分析"
  - "呆滞分析"
  - "优化方案"
