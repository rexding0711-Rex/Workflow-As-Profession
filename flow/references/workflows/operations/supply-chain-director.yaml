---
name: supply-chain-director
description: "供应链总监工作流：战略→规划→协同→成本→韧性"

daily:
  - skill: /execute
    trigger: "管理供应链、审批决策、协调资源"
    output: "供应链总监日志"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪供应链绩效、风险、成本"
    output: "供应链总监监控"
    time: "15min"
  - skill: /mark
    trigger: "标记供应链风险、机会、问题"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "供应链战略"
    flow:
      - skill: /analyze
        step: "1. 供应链分析"
        output: "供应链分析"
        time: "3h"
      - skill: /create
        step: "2. 供应链战略"
        output: "供应链战略"
        time: "3h"
      - skill: /pitch
        step: "3. 战略汇报"
        output: "汇报材料"
        time: "2h"
      - skill: /review
        step: "4. 战略评估"
        output: "评估报告"
        time: "1h"
    total: "2-3天"

  - name: "网络规划"
    flow:
      - skill: /design
        step: "1. 网络设计"
        output: "网络设计"
        time: "3h"
      - skill: /modeling
        step: "2. 网络模型"
        output: "网络模型"
        time: "2h"
      - skill: /execute
        step: "3. 网络优化"
        output: "优化记录"
        time: "持续"
      - skill: /review
        step: "4. 规划评估"
        output: "评估报告"
        time: "1h"
    total: "2-3天"

  - name: "协同管理"
    flow:
      - skill: /interview
        step: "1. 协同沟通"
        output: "沟通记录"
        time: "2h"
      - skill: /execute
        step: "2. 信息共享"
        output: "共享记录"
        time: "持续"
      - skill: /monitor
        step: "3. 协同监控"
        output: "监控记录"
        time: "持续"
      - skill: /analyze
        step: "4. 协同分析"
        output: "协同分析"
        time: "2h"
    total: "持续"

  - name: "韧性建设"
    flow:
      - skill: /analyze
        step: "1. 风险分析"
        output: "风险分析"
        time: "2h"
      - skill: /create
        step: "2. 应急预案"
        output: "应急预案"
        time: "2h"
      - skill: /execute
        step: "3. 备份建设"
        output: "建设记录"
        time: "持续"
      - skill: /experiment
        step: "4. 应急演练"
        output: "演练报告"
        time: "2h"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /create
  - /pitch
  - /review
  - /design
  - /modeling
  - /interview
  - /experiment
  - /mark

output:
  - "供应链分析"
  - "供应链战略"
  - "汇报材料"
  - "网络设计"
  - "网络模型"
  - "优化记录"
  - "沟通记录"
  - "共享记录"
  - "监控记录"
  - "协同分析"
  - "风险分析"
  - "应急预案"
  - "建设记录"
  - "演练报告"
