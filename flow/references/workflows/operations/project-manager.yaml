---
name: project-manager
description: "项目经理工作流：启动→计划→执行→监控→收尾"

daily:
  - skill: /execute
    trigger: "跟踪项目进度、任务、风险、沟通"
    output: "项目日报"
    time: "15min"
  - skill: /monitor
    trigger: "监控项目里程碑、预算、资源、质量"
    output: "项目监控"
    time: "15min"
  - skill: /mark
    trigger: "标记项目风险、问题、变更、决策"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "项目启动"
    flow:
      - skill: /interview
        step: "1. 干系人访谈"
        output: "访谈记录"
        time: "2h"
      - skill: /plan
        step: "2. 项目章程与计划"
        output: "项目章程"
        time: "3h"
      - skill: /create
        step: "3. 项目管理计划"
        output: "管理计划"
        time: "3h"
      - skill: /workshop
        step: "4. 启动会"
        output: "启动会方案"
        time: "1h"
    total: "1-2天"

  - name: "项目执行"
    flow:
      - skill: /execute
        step: "1. 任务执行与跟踪"
        output: "执行记录"
        time: "持续"
      - skill: /monitor
        step: "2. 进度与风险监控"
        output: "监控报告"
        time: "持续"
      - skill: /new-info
        step: "3. 沟通与变更管理"
        output: "变更记录"
        time: "持续"
    total: "持续"

  - name: "风险管理"
    flow:
      - skill: /analyze
        step: "1. 风险识别"
        output: "风险清单"
        time: "2h"
      - skill: /modeling
        step: "2. 风险评估模型"
        output: "评估模型"
        time: "2h"
      - skill: /create
        step: "3. 风险应对计划"
        output: "应对计划"
        time: "2h"
      - skill: /execute
        step: "4. 风险监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

  - name: "项目收尾"
    flow:
      - skill: /analyze
        step: "1. 项目验收"
        output: "验收报告"
        time: "2h"
      - skill: /review
        step: "2. 项目复盘"
        output: "复盘报告"
        time: "2h"
      - skill: /create
        step: "3. 项目文档归档"
        output: "归档文档"
        time: "1h"
      - skill: /pitch
        step: "4. 项目汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

skills:
  - /execute
  - /monitor
  - /interview
  - /plan
  - /create
  - /workshop
  - /new-info
  - /analyze
  - /modeling
  - /review
  - /pitch
  - /mark

output:
  - "访谈记录"
  - "项目章程"
  - "管理计划"
  - "启动会方案"
  - "执行记录"
  - "监控报告"
  - "变更记录"
  - "风险清单"
  - "评估模型"
  - "应对计划"
  - "验收报告"
  - "复盘报告"
  - "汇报材料"
