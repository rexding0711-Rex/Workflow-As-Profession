---
name: procurement-manager
description: "采购经理工作流：需求→寻源→比价→合同→供应商管理"

daily:
  - skill: /execute
    trigger: "跟踪采购订单、交付、质量"
    output: "采购日报"
    time: "15min"
  - skill: /monitor
    trigger: "监控供应商绩效、库存、成本"
    output: "采购监控"
    time: "10min"
  - skill: /mark
    trigger: "标记采购问题、成本节约、风险"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "采购寻源"
    flow:
      - skill: /analyze
        step: "1. 采购需求分析"
        output: "需求分析"
        time: "2h"
      - skill: /market-search
        step: "2. 供应商市场搜索"
        output: "市场搜索"
        time: "2h"
      - skill: /dd
        step: "3. 供应商尽调"
        output: "尽调报告"
        time: "2h"
      - skill: /tech-compare
        step: "4. 供应商对比"
        output: "供应商对比"
        time: "1h"
    total: "1-2天"

  - name: "采购谈判"
    flow:
      - skill: /analyze
        step: "1. 采购数据分析"
        output: "采购分析"
        time: "2h"
      - skill: /modeling
        step: "2. 成本模型"
        output: "成本模型"
        time: "2h"
      - skill: /negotiate
        step: "3. 谈判策略"
        output: "谈判方案"
        time: "2h"
      - skill: /deal
        step: "4. 合同签订"
        output: "合同记录"
        time: "1h"
    total: "1-2天"

  - name: "供应商管理"
    flow:
      - skill: /analyze
        step: "1. 供应商绩效分析"
        output: "绩效分析"
        time: "2h"
      - skill: /dd
        step: "2. 供应商评估"
        output: "供应商评估"
        time: "2h"
      - skill: /create
        step: "3. 管理方案"
        output: "管理方案"
        time: "2h"
      - skill: /execute
        step: "4. 管理执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

  - name: "成本优化"
    flow:
      - skill: /analyze
        step: "1. 采购成本分析"
        output: "成本分析"
        time: "2h"
      - skill: /modeling
        step: "2. 成本优化模型"
        output: "优化模型"
        time: "2h"
      - skill: /create
        step: "3. 降本方案"
        output: "降本方案"
        time: "2h"
      - skill: /execute
        step: "4. 方案执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /market-search
  - /dd
  - /tech-compare
  - /modeling
  - /negotiate
  - /deal
  - /create
  - /mark

output:
  - "需求分析"
  - "市场搜索"
  - "尽调报告"
  - "供应商对比"
  - "采购分析"
  - "成本模型"
  - "谈判方案"
  - "合同记录"
  - "绩效分析"
  - "供应商评估"
  - "管理方案"
  - "成本分析"
  - "优化模型"
  - "降本方案"
