---
name: event-manager
description: "活动经理工作流：策划→预算→执行→现场→复盘"

daily:
  - skill: /execute
    trigger: "跟踪活动进度、供应商、物料、人员"
    output: "活动日报"
    time: "15min"
  - skill: /monitor
    trigger: "监控活动预算、风险、注册、反馈"
    output: "活动监控"
    time: "10min"
  - skill: /mark
    trigger: "标记活动问题、亮点、改进点"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "活动策划"
    flow:
      - skill: /create
        step: "1. 活动概念与方案"
        output: "活动方案"
        time: "3h"
      - skill: /modeling
        step: "2. 预算与ROI模型"
        output: "预算模型"
        time: "2h"
      - skill: /plan
        step: "3. 活动计划"
        output: "活动计划"
        time: "2h"
      - skill: /execute
        step: "4. 供应商对接"
        output: "对接记录"
        time: "持续"
    total: "1-2周"

  - name: "活动执行"
    flow:
      - skill: /execute
        step: "1. 现场执行"
        output: "执行记录"
        time: "持续"
      - skill: /monitor
        step: "2. 现场监控"
        output: "监控记录"
        time: "持续"
      - skill: /new-info
        step: "3. 应急处理"
        output: "应急记录"
        time: "持续"
    total: "活动当天"

  - name: "活动复盘"
    flow:
      - skill: /analyze
        step: "1. 活动数据分析"
        output: "活动分析"
        time: "2h"
      - skill: /user-research
        step: "2. 参与者反馈"
        output: "反馈报告"
        time: "2h"
      - skill: /review
        step: "3. 活动复盘"
        output: "复盘报告"
        time: "2h"
      - skill: /pitch
        step: "4. 汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

  - name: "供应商管理"
    flow:
      - skill: /dd
        step: "1. 供应商评估"
        output: "供应商评估"
        time: "2h"
      - skill: /analyze
        step: "2. 供应商绩效分析"
        output: "绩效分析"
        time: "2h"
      - skill: /create
        step: "3. 管理方案"
        output: "管理方案"
        time: "2h"
      - skill: /execute
        step: "4. 管理执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /create
  - /modeling
  - /plan
  - /new-info
  - /analyze
  - /user-research
  - /review
  - /pitch
  - /dd
  - /mark

output:
  - "活动方案"
  - "预算模型"
  - "活动计划"
  - "执行记录"
  - "监控记录"
  - "应急记录"
  - "活动分析"
  - "反馈报告"
  - "复盘报告"
  - "供应商评估"
  - "绩效分析"
  - "管理方案"
