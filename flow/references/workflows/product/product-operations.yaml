---
name: product-operations
description: "产品运营工作流：数据分析→用户→活动→内容→增长"

daily:
  - skill: /analyze
    trigger: "跟踪产品数据、用户行为、运营指标"
    output: "运营仪表盘"
    time: "15min"
  - skill: /monitor
    trigger: "监控活动效果、用户反馈、异常"
    output: "运营监控"
    time: "10min"
  - skill: /mark
    trigger: "标记运营洞察、用户反馈、机会"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "用户运营"
    flow:
      - skill: /analyze
        step: "1. 用户分层与画像"
        output: "用户画像"
        time: "2h"
      - skill: /user-research
        step: "2. 用户访谈与反馈"
        output: "用户反馈"
        time: "2h"
      - skill: /create
        step: "3. 用户运营内容"
        output: "运营内容"
        time: "2h"
      - skill: /execute
        step: "4. 用户运营执行"
        output: "执行计划"
        time: "持续"
    total: "持续"

  - name: "活动运营"
    flow:
      - skill: /create
        step: "1. 活动策划方案"
        output: "活动方案"
        time: "2h"
      - skill: /modeling
        step: "2. 活动预算与ROI模型"
        output: "预算模型"
        time: "1h"
      - skill: /execute
        step: "3. 活动执行"
        output: "执行记录"
        time: "持续"
      - skill: /review
        step: "4. 活动复盘"
        output: "复盘报告"
        time: "1h"
    total: "1-2周"

  - name: "内容运营"
    flow:
      - skill: /create
        step: "1. 内容策划与创作"
        output: "内容素材"
        time: "3h"
      - skill: /geo
        step: "2. SEO/GEO优化"
        output: "优化方案"
        time: "1h"
      - skill: /experiment
        step: "3. 内容A/B测试"
        output: "测试结果"
        time: "2周"
    total: "持续"

  - name: "增长运营"
    flow:
      - skill: /analyze
        step: "1. 增长数据分析"
        output: "增长分析"
        time: "2h"
      - skill: /experiment
        step: "2. 增长实验"
        output: "实验结果"
        time: "2周"
      - skill: /modeling
        step: "3. 增长模型"
        output: "增长模型"
        time: "2h"
      - skill: /execute
        step: "4. 增长执行"
        output: "执行计划"
        time: "持续"
    total: "持续"

skills:
  - /analyze
  - /user-research
  - /create
  - /execute
  - /modeling
  - /review
  - /geo
  - /experiment
  - /monitor
  - /mark

output:
  - "用户画像"
  - "用户反馈"
  - "运营内容"
  - "活动方案"
  - "预算模型"
  - "复盘报告"
  - "内容素材"
  - "优化方案"
  - "增长分析"
  - "增长模型"
