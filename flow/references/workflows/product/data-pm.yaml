---
name: data-pm
description: "数据产品经理工作流：数据→分析→需求→可视化→实验"

daily:
  - skill: /analyze
    trigger: "跟踪数据质量、使用数据、异常"
    output: "数据仪表盘"
    time: "10min"
  - skill: /monitor
    trigger: "监控数据产品性能、用户反馈"
    output: "产品监控"
    time: "10min"
  - skill: /mark
    trigger: "标记数据洞察、需求、问题"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "数据需求分析"
    flow:
      - skill: /user-research
        step: "1. 数据用户访谈"
        output: "用户访谈"
        time: "2h"
      - skill: /analyze
        step: "2. 数据使用分析"
        output: "使用分析"
        time: "2h"
      - skill: /market-search
        step: "3. 数据竞品分析"
        output: "竞品分析"
        time: "2h"
      - skill: /decide
        step: "4. 数据需求优先级"
        output: "优先级"
        time: "1h"
    total: "1-2天"

  - name: "数据产品设计"
    flow:
      - skill: /design
        step: "1. 数据可视化设计"
        output: "可视化设计"
        time: "3h"
      - skill: /tech-compare
        step: "2. 数据技术方案对比"
        output: "技术对比"
        time: "2h"
      - skill: /create
        step: "3. 数据PRD"
        output: "PRD文档"
        time: "3h"
    total: "1-2天"

  - name: "数据产品上线"
    flow:
      - skill: /experiment
        step: "1. 数据产品测试"
        output: "测试方案"
        time: "2周"
      - skill: /analyze
        step: "2. 数据质量监控"
        output: "质量监控"
        time: "持续"
      - skill: /user-research
        step: "3. 用户反馈"
        output: "反馈报告"
        time: "1h"
      - skill: /review
        step: "4. 上线复盘"
        output: "复盘报告"
        time: "1h"
    total: "2-3周"

  - name: "数据治理"
    flow:
      - skill: /analyze
        step: "1. 数据质量分析"
        output: "质量分析"
        time: "2h"
      - skill: /process
        step: "2. 数据流程与标准"
        output: "数据标准"
        time: "2h"
      - skill: /policy
        step: "3. 数据合规与隐私"
        output: "合规分析"
        time: "1h"
      - skill: /execute
        step: "4. 治理执行"
        output: "执行计划"
        time: "持续"
    total: "持续"

skills:
  - /analyze
  - /user-research
  - /market-search
  - /decide
  - /design
  - /tech-compare
  - /create
  - /experiment
  - /monitor
  - /review
  - /process
  - /policy
  - /execute
  - /mark

output:
  - "用户访谈"
  - "使用分析"
  - "竞品分析"
  - "可视化设计"
  - "PRD文档"
  - "测试方案"
  - "质量监控"
  - "质量分析"
  - "数据标准"
  - "合规分析"
