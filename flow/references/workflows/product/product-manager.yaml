---
name: product-manager
description: "产品经理工作流：需求→用户研究→PRD→实验→Roadmap"

daily:
  - skill: /monitor
    trigger: "跟踪产品数据、用户反馈、竞品动态"
    output: "产品仪表盘"
    time: "10min"
  - skill: /new-info
    trigger: "扫描行业动态、技术趋势、竞品发布"
    output: "产品情报"
    time: "5min"
  - skill: /mark
    trigger: "标记需求洞察、用户痛点、决策点"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "需求发现"
    flow:
      - skill: /user-research
        step: "1. 用户访谈与需求挖掘"
        output: "需求清单"
        time: "3h"
      - skill: /analyze
        step: "2. 用户行为数据分析"
        output: "行为分析"
        time: "2h"
      - skill: /market-search
        step: "3. 市场需求与竞品分析"
        output: "市场分析"
        time: "2h"
      - skill: /decide
        step: "4. 需求优先级决策"
        output: "优先级矩阵"
        time: "1h"
    total: "1-2天"

  - name: "产品设计"
    flow:
      - skill: /user-research
        step: "1. 用户旅程与痛点分析"
        output: "用户旅程"
        time: "2h"
      - skill: /design
        step: "2. 产品原型设计"
        output: "原型方案"
        time: "3h"
      - skill: /tech-compare
        step: "3. 技术方案对比"
        output: "技术对比"
        time: "2h"
      - skill: /create
        step: "4. PRD撰写"
        output: "PRD文档"
        time: "3h"
    total: "1-2天"

  - name: "产品开发"
    flow:
      - skill: /plan
        step: "1. 开发计划与里程碑"
        output: "开发计划"
        time: "2h"
      - skill: /execute
        step: "2. 开发进度跟踪"
        output: "进度跟踪"
        time: "持续"
      - skill: /review
        step: "3. 需求评审与验收"
        output: "验收报告"
        time: "1h"
    total: "持续"

  - name: "产品上线"
    flow:
      - skill: /experiment
        step: "1. A/B测试与灰度发布"
        output: "测试方案"
        time: "2周"
      - skill: /analyze
        step: "2. 上线数据监控"
        output: "数据监控"
        time: "持续"
      - skill: /user-research
        step: "3. 用户反馈收集"
        output: "反馈报告"
        time: "1h"
      - skill: /review
        step: "4. 上线复盘"
        output: "复盘报告"
        time: "1h"
    total: "2-3周"

skills:
  - /user-research
  - /analyze
  - /market-search
  - /decide
  - /design
  - /tech-compare
  - /create
  - /plan
  - /execute
  - /review
  - /experiment
  - /new-info
  - /monitor
  - /mark

output:
  - "需求清单"
  - "行为分析"
  - "市场分析"
  - "用户旅程"
  - "原型方案"
  - "PRD文档"
  - "开发计划"
  - "验收报告"
  - "测试方案"
  - "复盘报告"
