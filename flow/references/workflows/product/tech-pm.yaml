---
name: tech-pm
description: "技术产品经理工作流：技术→需求→技术对比→PRD→实验"

daily:
  - skill: /monitor
    trigger: "跟踪技术数据、系统性能、技术债务"
    output: "技术仪表盘"
    time: "10min"
  - skill: /new-info
    trigger: "扫描技术动态、架构趋势、开源项目"
    output: "技术情报"
    time: "5min"
  - skill: /mark
    trigger: "标记技术洞察、架构决策、风险"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "技术需求分析"
    flow:
      - skill: /user-research
        step: "1. 技术用户访谈"
        output: "用户访谈"
        time: "2h"
      - skill: /analyze
        step: "2. 技术债务与性能分析"
        output: "技术分析"
        time: "2h"
      - skill: /tech-compare
        step: "3. 技术方案对比"
        output: "技术对比"
        time: "2h"
      - skill: /decide
        step: "4. 技术优先级决策"
        output: "优先级"
        time: "1h"
    total: "1-2天"

  - name: "技术架构设计"
    flow:
      - skill: /design
        step: "1. 技术架构设计"
        output: "架构设计"
        time: "3h"
      - skill: /tech-compare
        step: "2. 技术选型对比"
        output: "选型对比"
        time: "2h"
      - skill: /create
        step: "3. 技术PRD"
        output: "PRD文档"
        time: "3h"
    total: "1-2天"

  - name: "技术产品上线"
    flow:
      - skill: /experiment
        step: "1. 技术灰度与测试"
        output: "测试方案"
        time: "2周"
      - skill: /analyze
        step: "2. 性能监控"
        output: "性能监控"
        time: "持续"
      - skill: /user-research
        step: "3. 开发者反馈"
        output: "反馈报告"
        time: "1h"
      - skill: /review
        step: "4. 技术复盘"
        output: "复盘报告"
        time: "1h"
    total: "2-3周"

  - name: "技术债务管理"
    flow:
      - skill: /analyze
        step: "1. 技术债务评估"
        output: "债务评估"
        time: "2h"
      - skill: /modeling
        step: "2. 重构ROI模型"
        output: "ROI模型"
        time: "2h"
      - skill: /plan
        step: "3. 重构计划"
        output: "重构计划"
        time: "2h"
      - skill: /execute
        step: "4. 重构执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

skills:
  - /monitor
  - /new-info
  - /user-research
  - /analyze
  - /tech-compare
  - /decide
  - /design
  - /create
  - /experiment
  - /review
  - /modeling
  - /plan
  - /execute
  - /mark

output:
  - "用户访谈"
  - "技术分析"
  - "技术对比"
  - "架构设计"
  - "选型对比"
  - "PRD文档"
  - "测试方案"
  - "性能监控"
  - "债务评估"
  - "重构计划"
