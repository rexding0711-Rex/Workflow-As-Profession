---
name: market-analyst
description: "市场分析工作流：数据→洞察→预测→策略→报告"

daily:
  - skill: /analyze
    trigger: "分析市场数据、趋势、份额"
    output: "市场分析"
    time: "15min"
  - skill: /new-info
    trigger: "跟踪市场动态、政策、竞品"
    output: "市场情报"
    time: "15min"
  - skill: /mark
    trigger: "标记市场机会、风险、洞察"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "市场数据"
    flow:
      - skill: /market-search
        step: "1. 数据收集"
        output: "数据收集"
        time: "2h"
      - skill: /analyze
        step: "2. 数据清洗"
        output: "数据清洗"
        time: "2h"
      - skill: /analyze
        step: "3. 数据分析"
        output: "数据分析"
        time: "3h"
    total: "1-2天"

  - name: "市场洞察"
    flow:
      - skill: /analyze
        step: "1. 洞察分析"
        output: "洞察分析"
        time: "3h"
      - skill: /visual
        step: "2. 可视化"
        output: "可视化报告"
        time: "2h"
      - skill: /create
        step: "3. 洞察报告"
        output: "洞察报告"
        time: "2h"
      - skill: /pitch
        step: "4. 洞察汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

  - name: "市场预测"
    flow:
      - skill: /modeling
        step: "1. 预测模型"
        output: "预测模型"
        time: "3h"
      - skill: /modeling
        step: "2. 情景分析"
        output: "情景分析"
        time: "2h"
      - skill: /experiment
        step: "3. 模型验证"
        output: "验证报告"
        time: "2h"
      - skill: /create
        step: "4. 预测报告"
        output: "预测报告"
        time: "2h"
    total: "2-3天"

  - name: "市场策略"
    flow:
      - skill: /analyze
        step: "1. 策略分析"
        output: "策略分析"
        time: "2h"
      - skill: /create
        step: "2. 策略建议"
        output: "策略建议"
        time: "2h"
      - skill: /pitch
        step: "3. 策略汇报"
        output: "汇报材料"
        time: "1h"
      - skill: /review
        step: "4. 策略评估"
        output: "评估报告"
        time: "1h"
    total: "1-2天"

skills:
  - /analyze
  - /new-info
  - /market-search
  - /visual
  - /create
  - /pitch
  - /modeling
  - /experiment
  - /review
  - /mark

output:
  - "数据收集"
  - "数据分析"
  - "洞察分析"
  - "可视化报告"
  - "洞察报告"
  - "预测模型"
  - "情景分析"
  - "预测报告"
  - "策略分析"
  - "策略建议"
  - "汇报材料"
  - "评估报告"
