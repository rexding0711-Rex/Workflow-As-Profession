---
name: risk-analyst
description: "风险分析师工作流：风险→数据→模型→监控→报告"

daily:
  - skill: /monitor
    trigger: "跟踪风险指标、异常、预警信号"
    output: "风险仪表盘"
    time: "15min"
  - skill: /analyze
    trigger: "分析风险数据、模型表现、趋势"
    output: "风险分析"
    time: "10min"
  - skill: /mark
    trigger: "标记风险事件、洞察、建议"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "信用风险"
    flow:
      - skill: /analyze
        step: "1. 信用数据收集与分析"
        output: "信用分析"
        time: "2h"
      - skill: /modeling
        step: "2. 信用评分模型"
        output: "评分模型"
        time: "3h"
      - skill: /experiment
        step: "3. 模型验证"
        output: "验证报告"
        time: "2h"
      - skill: /monitor
        step: "4. 信用监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

  - name: "市场风险"
    flow:
      - skill: /analyze
        step: "1. 市场数据收集"
        output: "市场数据"
        time: "2h"
      - skill: /modeling
        step: "2. VaR/ES模型"
        output: "风险模型"
        time: "3h"
      - skill: /visual
        step: "3. 风险可视化"
        output: "可视化报告"
        time: "2h"
      - skill: /monitor
        step: "4. 市场风险监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

  - name: "操作风险"
    flow:
      - skill: /process
        step: "1. 操作风险梳理"
        output: "风险梳理"
        time: "2h"
      - skill: /analyze
        step: "2. 操作风险分析"
        output: "风险分析"
        time: "2h"
      - skill: /policy
        step: "3. 风险控制政策"
        output: "控制政策"
        time: "2h"
      - skill: /execute
        step: "4. 控制执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

  - name: "风险报告"
    flow:
      - skill: /analyze
        step: "1. 风险数据汇总"
        output: "数据汇总"
        time: "2h"
      - skill: /visual
        step: "2. 风险可视化"
        output: "可视化报告"
        time: "2h"
      - skill: /pitch
        step: "3. 风险汇报"
        output: "汇报材料"
        time: "1h"
      - skill: /review
        step: "4. 风险复盘"
        output: "复盘报告"
        time: "1h"
    total: "1天"

skills:
  - /monitor
  - /analyze
  - /modeling
  - /experiment
  - /visual
  - /process
  - /policy
  - /execute
  - /pitch
  - /review
  - /mark

output:
  - "信用分析"
  - "评分模型"
  - "验证报告"
  - "市场数据"
  - "风险模型"
  - "可视化报告"
  - "风险梳理"
  - "风险分析"
  - "控制政策"
  - "汇报材料"
