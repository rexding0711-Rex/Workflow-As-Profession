---
name: data-analyst
description: "数据分析师工作流：需求→数据→分析→可视化→报告"

daily:
  - skill: /analyze
    trigger: "分析数据、指标、异常"
    output: "分析日志"
    time: "15min"
  - skill: /execute
    trigger: "处理数据需求、ETL、报表"
    output: "执行日志"
    time: "持续"
  - skill: /mark
    trigger: "标记数据问题、洞察、机会"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "需求分析"
    flow:
      - skill: /interview
        step: "1. 需求访谈"
        output: "访谈记录"
        time: "2h"
      - skill: /analyze
        step: "2. 需求分析"
        output: "需求分析"
        time: "2h"
      - skill: /create
        step: "3. 需求文档"
        output: "需求文档"
        time: "1h"
    total: "半天"

  - name: "数据处理"
    flow:
      - skill: /analyze
        step: "1. 数据收集"
        output: "数据收集"
        time: "2h"
      - skill: /analyze
        step: "2. 数据清洗"
        output: "数据清洗"
        time: "2h"
      - skill: /execute
        step: "3. 数据处理"
        output: "数据处理"
        time: "3h"
      - skill: /review
        step: "4. 数据验证"
        output: "验证报告"
        time: "1h"
    total: "1-2天"

  - name: "数据分析"
    flow:
      - skill: /analyze
        step: "1. 探索分析"
        output: "探索分析"
        time: "3h"
      - skill: /analyze
        step: "2. 统计分析"
        output: "统计分析"
        time: "3h"
      - skill: /modeling
        step: "3. 建模分析"
        output: "建模分析"
        time: "3h"
      - skill: /create
        step: "4. 分析报告"
        output: "分析报告"
        time: "2h"
    total: "2-3天"

  - name: "可视化报告"
    flow:
      - skill: /visual
        step: "1. 可视化设计"
        output: "可视化设计"
        time: "3h"
      - skill: /visual
        step: "2. 报表开发"
        output: "报表开发"
        time: "3h"
      - skill: /execute
        step: "3. 报表发布"
        output: "发布记录"
        time: "1h"
      - skill: /monitor
        step: "4. 报表监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

skills:
  - /analyze
  - /execute
  - /interview
  - /create
  - /review
  - /modeling
  - /visual
  - /monitor
  - /mark

output:
  - "访谈记录"
  - "需求分析"
  - "需求文档"
  - "数据收集"
  - "数据清洗"
  - "数据处理"
  - "验证报告"
  - "探索分析"
  - "统计分析"
  - "建模分析"
  - "分析报告"
  - "可视化设计"
  - "报表开发"
  - "发布记录"
