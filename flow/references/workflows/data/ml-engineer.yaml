---
name: ml-engineer
description: "ML工程师工作流：数据→模型→实验→部署→监控"

daily:
  - skill: /monitor
    trigger: "跟踪模型性能、数据质量、系统状态"
    output: "ML监控"
    time: "15min"
  - skill: /execute
    trigger: "处理模型异常、数据漂移、性能问题"
    output: "运维记录"
    time: "持续"
  - skill: /mark
    trigger: "标记模型问题、优化点、技术决策"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "模型开发"
    flow:
      - skill: /analyze
        step: "1. 数据预处理与特征工程"
        output: "特征工程"
        time: "3h"
      - skill: /modeling
        step: "2. 模型训练与调参"
        output: "模型训练"
        time: "3h"
      - skill: /experiment
        step: "3. 模型验证与测试"
        output: "验证报告"
        time: "2h"
      - skill: /visual
        step: "4. 模型可视化"
        output: "可视化报告"
        time: "2h"
    total: "1-2天"

  - name: "模型部署"
    flow:
      - skill: /tech-compare
        step: "1. 部署方案对比"
        output: "部署对比"
        time: "2h"
      - skill: /execute
        step: "2. 模型部署"
        output: "部署记录"
        time: "3h"
      - skill: /monitor
        step: "3. 模型监控"
        output: "监控记录"
        time: "持续"
      - skill: /review
        step: "4. 部署复盘"
        output: "复盘报告"
        time: "1h"
    total: "2-3天"

  - name: "MLOps"
    flow:
      - skill: /process
        step: "1. MLOps流程设计"
        output: "流程设计"
        time: "2h"
      - skill: /design
        step: "2. MLOps架构设计"
        output: "架构设计"
        time: "3h"
      - skill: /execute
        step: "3. MLOps实施"
        output: "实施记录"
        time: "3h"
      - skill: /monitor
        step: "4. MLOps监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

  - name: "模型优化"
    flow:
      - skill: /analyze
        step: "1. 模型性能分析"
        output: "性能分析"
        time: "2h"
      - skill: /tech-compare
        step: "2. 优化方案对比"
        output: "优化对比"
        time: "2h"
      - skill: /execute
        step: "3. 优化执行"
        output: "执行记录"
        time: "3h"
      - skill: /monitor
        step: "4. 优化效果监控"
        output: "效果监控"
        time: "持续"
    total: "持续"

skills:
  - /monitor
  - /execute
  - /analyze
  - /modeling
  - /experiment
  - /visual
  - /tech-compare
  - /process
  - /design
  - /review
  - /mark

output:
  - "特征工程"
  - "模型训练"
  - "验证报告"
  - "可视化报告"
  - "部署对比"
  - "部署记录"
  - "流程设计"
  - "架构设计"
  - "性能分析"
  - "效果监控"
