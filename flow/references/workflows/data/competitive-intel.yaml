---
name: competitive-intel
description: "竞争情报工作流：监测→分析→预警→策略→报告"

daily:
  - skill: /monitor
    trigger: "跟踪竞品动态、数据、市场"
    output: "情报监控"
    time: "15min"
  - skill: /analyze
    trigger: "分析竞品策略、数据、趋势"
    output: "情报分析"
    time: "15min"
  - skill: /mark
    trigger: "标记关键情报、机会、威胁"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "竞品监测"
    flow:
      - skill: /market-search
        step: "1. 数据收集"
        output: "数据收集"
        time: "2h"
      - skill: /monitor
        step: "2. 持续监测"
        output: "监测记录"
        time: "持续"
      - skill: /analyze
        step: "3. 动态分析"
        output: "动态分析"
        time: "2h"
      - skill: /create
        step: "4. 监测报告"
        output: "监测报告"
        time: "1h"
    total: "持续"

  - name: "竞争分析"
    flow:
      - skill: /analyze
        step: "1. 竞品分析"
        output: "竞品分析"
        time: "3h"
      - skill: /modeling
        step: "2. 竞争模型"
        output: "竞争模型"
        time: "2h"
      - skill: /visual
        step: "3. 可视化"
        output: "可视化报告"
        time: "2h"
      - skill: /create
        step: "4. 分析报告"
        output: "分析报告"
        time: "2h"
    total: "1-2天"

  - name: "竞争预警"
    flow:
      - skill: /analyze
        step: "1. 风险识别"
        output: "风险识别"
        time: "2h"
      - skill: /modeling
        step: "2. 预警模型"
        output: "预警模型"
        time: "2h"
      - skill: /execute
        step: "3. 预警触发"
        output: "预警记录"
        time: "持续"
      - skill: /create
        step: "4. 预警方案"
        output: "预警方案"
        time: "1h"
    total: "持续"

  - name: "竞争策略"
    flow:
      - skill: /analyze
        step: "1. 策略分析"
        output: "策略分析"
        time: "2h"
      - skill: /create
        step: "2. 策略建议"
        output: "策略建议"
        time: "2h"
      - skill: /pitch
        step: "3. 策略汇报"
        output: "汇报材料"
        time: "1h"
      - skill: /review
        step: "4. 策略评估"
        output: "评估报告"
        time: "1h"
    total: "1-2天"

skills:
  - /monitor
  - /analyze
  - /market-search
  - /modeling
  - /visual
  - /create
  - /execute
  - /pitch
  - /review
  - /mark

output:
  - "数据收集"
  - "监测记录"
  - "动态分析"
  - "监测报告"
  - "竞品分析"
  - "竞争模型"
  - "可视化报告"
  - "分析报告"
  - "风险识别"
  - "预警模型"
  - "预警方案"
  - "策略建议"
  - "汇报材料"
  - "评估报告"
