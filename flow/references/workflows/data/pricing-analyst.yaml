---
name: pricing-analyst
description: "定价分析工作流：数据→模型→策略→测试→优化"

daily:
  - skill: /analyze
    trigger: "分析价格数据、弹性、竞品"
    output: "定价分析"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪价格执行、反馈、销量"
    output: "定价监控"
    time: "10min"
  - skill: /mark
    trigger: "标记价格问题、机会、风险"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "定价数据"
    flow:
      - skill: /analyze
        step: "1. 数据收集"
        output: "数据收集"
        time: "2h"
      - skill: /analyze
        step: "2. 数据清洗"
        output: "数据清洗"
        time: "2h"
      - skill: /analyze
        step: "3. 数据分析"
        output: "数据分析"
        time: "3h"
    total: "1-2天"

  - name: "定价模型"
    flow:
      - skill: /modeling
        step: "1. 弹性模型"
        output: "弹性模型"
        time: "3h"
      - skill: /modeling
        step: "2. 定价模型"
        output: "定价模型"
        time: "3h"
      - skill: /experiment
        step: "3. 模型测试"
        output: "测试报告"
        time: "2h"
      - skill: /review
        step: "4. 模型验证"
        output: "验证报告"
        time: "1h"
    total: "2-3天"

  - name: "定价策略"
    flow:
      - skill: /analyze
        step: "1. 策略分析"
        output: "策略分析"
        time: "2h"
      - skill: /create
        step: "2. 策略方案"
        output: "策略方案"
        time: "2h"
      - skill: /modeling
        step: "3. 收益预测"
        output: "预测模型"
        time: "2h"
      - skill: /pitch
        step: "4. 策略汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

  - name: "定价优化"
    flow:
      - skill: /experiment
        step: "1. 价格测试"
        output: "测试记录"
        time: "2周"
      - skill: /analyze
        step: "2. 效果分析"
        output: "效果分析"
        time: "2h"
      - skill: /modeling
        step: "3. 优化模型"
        output: "优化模型"
        time: "2h"
      - skill: /execute
        step: "4. 优化执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

skills:
  - /analyze
  - /monitor
  - /modeling
  - /experiment
  - /create
  - /pitch
  - /review
  - /execute
  - /mark

output:
  - "数据收集"
  - "数据分析"
  - "弹性模型"
  - "定价模型"
  - "测试报告"
  - "验证报告"
  - "策略分析"
  - "策略方案"
  - "预测模型"
  - "测试记录"
  - "效果分析"
  - "优化模型"
  - "执行记录"
