---
name: growth-analyst
description: "增长分析工作流：数据→实验→漏斗→归因→优化"

daily:
  - skill: /analyze
    trigger: "分析增长数据、实验、漏斗"
    output: "增长分析"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪增长指标、实验、异常"
    output: "增长监控"
    time: "10min"
  - skill: /mark
    trigger: "标记增长机会、瓶颈、假设"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "增长数据"
    flow:
      - skill: /analyze
        step: "1. 数据收集"
        output: "数据收集"
        time: "2h"
      - skill: /analyze
        step: "2. 漏斗分析"
        output: "漏斗分析"
        time: "3h"
      - skill: /visual
        step: "3. 可视化"
        output: "可视化报告"
        time: "2h"
    total: "1-2天"

  - name: "实验分析"
    flow:
      - skill: /experiment
        step: "1. 实验设计"
        output: "实验设计"
        time: "2h"
      - skill: /analyze
        step: "2. 实验分析"
        output: "实验分析"
        time: "2h"
      - skill: /modeling
        step: "3. 显著性检验"
        output: "检验报告"
        time: "2h"
      - skill: /create
        step: "4. 实验报告"
        output: "实验报告"
        time: "1h"
    total: "1-2天"

  - name: "归因分析"
    flow:
      - skill: /analyze
        step: "1. 归因模型"
        output: "归因模型"
        time: "3h"
      - skill: /modeling
        step: "2. 模型运算"
        output: "模型运算"
        time: "2h"
      - skill: /visual
        step: "3. 归因可视化"
        output: "可视化报告"
        time: "2h"
      - skill: /create
        step: "4. 归因报告"
        output: "归因报告"
        time: "1h"
    total: "1-2天"

  - name: "增长优化"
    flow:
      - skill: /analyze
        step: "1. 瓶颈分析"
        output: "瓶颈分析"
        time: "2h"
      - skill: /create
        step: "2. 优化方案"
        output: "优化方案"
        time: "2h"
      - skill: /experiment
        step: "3. 优化测试"
        output: "测试记录"
        time: "2周"
      - skill: /execute
        step: "4. 优化执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

skills:
  - /analyze
  - /monitor
  - /visual
  - /experiment
  - /modeling
  - /create
  - /execute
  - /mark

output:
  - "数据收集"
  - "漏斗分析"
  - "可视化报告"
  - "实验设计"
  - "实验分析"
  - "检验报告"
  - "归因模型"
  - "归因报告"
  - "瓶颈分析"
  - "优化方案"
  - "测试记录"
  - "执行记录"
