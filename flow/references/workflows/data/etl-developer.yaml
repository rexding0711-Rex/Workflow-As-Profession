---
name: etl-developer
description: "ETL开发工作流：数据→提取→转换→加载→调度"

daily:
  - skill: /monitor
    trigger: "跟踪ETL状态、数据质量、调度异常"
    output: "ETL监控"
    time: "15min"
  - skill: /execute
    trigger: "处理ETL故障、数据延迟、异常"
    output: "运维记录"
    time: "持续"
  - skill: /mark
    trigger: "标记ETL问题、优化点、需求"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "ETL设计"
    flow:
      - skill: /process
        step: "1. ETL流程设计"
        output: "ETL设计"
        time: "2h"
      - skill: /tech-compare
        step: "2. ETL工具对比"
        output: "工具对比"
        time: "2h"
      - skill: /create
        step: "3. ETL设计文档"
        output: "设计文档"
        time: "2h"
    total: "1-2天"

  - name: "ETL开发"
    flow:
      - skill: /execute
        step: "1. ETL开发"
        output: "开发记录"
        time: "3h"
      - skill: /experiment
        step: "2. ETL测试"
        output: "测试报告"
        time: "2h"
      - skill: /execute
        step: "3. ETL上线"
        output: "上线记录"
        time: "2h"
      - skill: /monitor
        step: "4. ETL监控"
        output: "监控记录"
        time: "持续"
    total: "2-3天"

  - name: "数据质量"
    flow:
      - skill: /analyze
        step: "1. 数据质量检查"
        output: "质量检查"
        time: "2h"
      - skill: /process
        step: "2. 质量规则开发"
        output: "规则开发"
        time: "2h"
      - skill: /execute
        step: "3. 质量监控执行"
        output: "监控记录"
        time: "持续"
      - skill: /review
        step: "4. 质量复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

  - name: "调度优化"
    flow:
      - skill: /analyze
        step: "1. 调度性能分析"
        output: "性能分析"
        time: "2h"
      - skill: /tech-compare
        step: "2. 调度方案对比"
        output: "方案对比"
        time: "2h"
      - skill: /execute
        step: "3. 调度优化执行"
        output: "执行记录"
        time: "3h"
      - skill: /monitor
        step: "4. 优化效果监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

skills:
  - /monitor
  - /execute
  - /process
  - /tech-compare
  - /analyze
  - /experiment
  - /review
  - /create
  - /mark

output:
  - "ETL设计"
  - "工具对比"
  - "设计文档"
  - "开发记录"
  - "测试报告"
  - "质量检查"
  - "规则开发"
  - "监控记录"
  - "性能分析"
  - "方案对比"
