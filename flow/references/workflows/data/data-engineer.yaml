---
name: data-engineer
description: "数据工程师工作流：数据→架构→ETL→监控→优化"

daily:
  - skill: /monitor
    trigger: "跟踪数据管道、ETL状态、系统性能"
    output: "管道监控"
    time: "15min"
  - skill: /execute
    trigger: "处理数据异常、故障、延迟"
    output: "运维记录"
    time: "持续"
  - skill: /mark
    trigger: "标记技术问题、优化点、架构决策"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "数据架构"
    flow:
      - skill: /design
        step: "1. 数据架构设计"
        output: "架构设计"
        time: "3h"
      - skill: /tech-compare
        step: "2. 技术选型对比"
        output: "选型对比"
        time: "2h"
      - skill: /create
        step: "3. 架构文档"
        output: "架构文档"
        time: "2h"
    total: "1-2天"

  - name: "ETL开发"
    flow:
      - skill: /process
        step: "1. ETL流程设计"
        output: "ETL设计"
        time: "2h"
      - skill: /execute
        step: "2. ETL开发"
        output: "开发记录"
        time: "3h"
      - skill: /experiment
        step: "3. ETL测试"
        output: "测试报告"
        time: "2h"
      - skill: /monitor
        step: "4. ETL上线监控"
        output: "监控记录"
        time: "持续"
    total: "2-3天"

  - name: "数据治理"
    flow:
      - skill: /analyze
        step: "1. 数据质量分析"
        output: "质量分析"
        time: "2h"
      - skill: /process
        step: "2. 数据标准与流程"
        output: "数据标准"
        time: "2h"
      - skill: /policy
        step: "3. 数据合规"
        output: "合规分析"
        time: "1h"
      - skill: /execute
        step: "4. 治理执行"
        output: "执行计划"
        time: "持续"
    total: "持续"

  - name: "性能优化"
    flow:
      - skill: /analyze
        step: "1. 性能瓶颈分析"
        output: "瓶颈分析"
        time: "2h"
      - skill: /tech-compare
        step: "2. 优化方案对比"
        output: "优化对比"
        time: "2h"
      - skill: /execute
        step: "3. 优化执行"
        output: "执行记录"
        time: "3h"
      - skill: /monitor
        step: "4. 优化效果监控"
        output: "效果监控"
        time: "持续"
    total: "持续"

skills:
  - /monitor
  - /execute
  - /design
  - /tech-compare
  - /process
  - /analyze
  - /experiment
  - /policy
  - /create
  - /mark

output:
  - "架构设计"
  - "选型对比"
  - "架构文档"
  - "ETL设计"
  - "测试报告"
  - "质量分析"
  - "数据标准"
  - "合规分析"
  - "瓶颈分析"
  - "效果监控"
