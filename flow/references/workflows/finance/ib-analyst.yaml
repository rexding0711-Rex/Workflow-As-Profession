---
name: ib-analyst
description: "投行分析师工作流：估值→建模→并购→汇报→行业分析"

daily:
  - skill: /new-info
    trigger: "扫描并购动态、IPO进展、行业新闻"
    output: "市场情报"
    time: "10min"
  - skill: /monitor
    trigger: "跟踪在途项目进度、客户要求"
    output: "项目摘要"
    time: "10min"
  - skill: /mark
    trigger: "标记关键数据、假设变化、客户反馈"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "估值与建模"
    flow:
      - skill: /modeling
        step: "1. DCF/可比/先例交易估值模型"
        output: "估值模型"
        time: "2天"
      - skill: /analyze
        step: "2. 财务数据分析与预测"
        output: "财务分析"
        time: "1天"
      - skill: /professional
        step: "3. 行业分析（趋势/竞争）"
        output: "行业分析"
        time: "1天"
      - skill: /visual
        step: "4. 模型可视化与敏感性分析"
        output: "图表"
        time: "3h"
    total: "3-4天"

  - name: "并购交易"
    flow:
      - skill: /dd
        step: "1. 财务尽调（FDD）"
        output: "尽调报告"
        time: "1-2周"
      - skill: /modeling
        step: "2. LBO/并购模型"
        output: "并购模型"
        time: "2天"
      - skill: /deal
        step: "3. 交易结构与条款设计"
        output: "交易方案"
        time: "1天"
      - skill: /pitch
        step: "4. 客户汇报与推介"
        output: "汇报材料"
        time: "2天"
    total: "2-3周"

  - name: "IPO项目"
    flow:
      - skill: /modeling
        step: "1. 估值模型与定价分析"
        output: "估值模型"
        time: "2天"
      - skill: /dd
        step: "2. IPO尽调准备"
        output: "尽调材料"
        time: "1周"
      - skill: /pitch
        step: "3. 招股书与路演材料"
        output: "招股书/路演材料"
        time: "3天"
      - skill: /policy
        step: "4. 监管合规与审批"
        output: "合规分析"
        time: "1天"
    total: "2-3周"

  - name: "行业研究"
    flow:
      - skill: /learn
        step: "1. 行业快速认知建立"
        output: "认知地图"
        time: "2h"
      - skill: /market-search
        step: "2. 市场规模与竞争分析"
        output: "市场分析"
        time: "2h"
      - skill: /graph-builder
        step: "3. 产业链图谱"
        output: "产业图谱"
        time: "1h"
      - skill: /analyze
        step: "4. 数据验证与趋势分析"
        output: "数据报告"
        time: "2h"
      - skill: /pitch
        step: "5. 研究报告撰写"
        output: "研究报告"
        time: "3h"
    total: "1-2天"

skills:
  - /modeling
  - /analyze
  - /dd
  - /deal
  - /pitch
  - /visual
  - /learn
  - /market-search
  - /graph-builder
  - /professional
  - /policy
  - /new-info
  - /monitor
  - /mark

output:
  - "估值模型"
  - "并购模型"
  - "尽调报告"
  - "交易方案"
  - "招股书"
  - "路演材料"
  - "行业研究报告"
  - "合规分析"
