---
name: financial-analyst
description: "财务分析师工作流：财务建模→三表分析→估值→预算→报告"

daily:
  - skill: /monitor
    trigger: "跟踪财务数据、预算执行、异常指标"
    output: "财务摘要"
    time: "15min"
  - skill: /new-info
    trigger: "扫描行业财报、政策变化、会计准则"
    output: "行业情报"
    time: "10min"
  - skill: /mark
    trigger: "标记关键假设、数据变化、风险信号"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "财务建模"
    flow:
      - skill: /modeling
        step: "1. 三表模型（利润/资产负债/现金流）"
        output: "财务模型"
        time: "2天"
      - skill: /analyze
        step: "2. 历史财务分析（同比/环比/结构）"
        output: "财务分析"
        time: "1天"
      - skill: /professional
        step: "3. 杜邦分析/财务指标分析"
        output: "指标分析"
        time: "3h"
      - skill: /visual
        step: "4. 财务可视化"
        output: "图表"
        time: "2h"
    total: "3-4天"

  - name: "估值分析"
    flow:
      - skill: /modeling
        step: "1. DCF/可比/先例估值"
        output: "估值模型"
        time: "2天"
      - skill: /analyze
        step: "2. 敏感性分析与情景规划"
        output: "情景分析"
        time: "1天"
      - skill: /decide
        step: "3. 估值结论与投资建议"
        output: "投资建议"
        time: "1h"
    total: "2-3天"

  - name: "预算与预测"
    flow:
      - skill: /modeling
        step: "1. 预算编制模型"
        output: "预算模型"
        time: "2天"
      - skill: /analyze
        step: "2. 预算执行分析（偏差/原因）"
        output: "执行分析"
        time: "1天"
      - skill: /pitch
        step: "3. 预算汇报"
        output: "汇报材料"
        time: "2h"
    total: "2-3天"

  - name: "财务报告"
    flow:
      - skill: /analyze
        step: "1. 财报深度分析"
        output: "财报分析"
        time: "2h"
      - skill: /visual
        step: "2. 报告可视化"
        output: "图表"
        time: "2h"
      - skill: /pitch
        step: "3. 管理层/投资人汇报"
        output: "汇报材料"
        time: "2h"
    total: "1天"

skills:
  - /modeling
  - /analyze
  - /professional
  - /visual
  - /decide
  - /pitch
  - /new-info
  - /monitor
  - /mark

output:
  - "财务模型"
  - "财务分析报告"
  - "估值模型"
  - "投资建议"
  - "预算模型"
  - "执行分析"
  - "财报分析"
  - "汇报材料"
