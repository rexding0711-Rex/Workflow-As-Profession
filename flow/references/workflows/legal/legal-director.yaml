---
name: legal-director
description: "法务总监工作流：战略→风险→合规→管理→支持"

daily:
  - skill: /execute
    trigger: "管理法务团队、审批重大决策、协调资源"
    output: "法务总监日志"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪法律风险、合规、预算"
    output: "法务总监监控"
    time: "15min"
  - skill: /mark
    trigger: "标记战略风险、机会、决策"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "法律战略"
    flow:
      - skill: /analyze
        step: "1. 战略分析"
        output: "战略分析"
        time: "3h"
      - skill: /create
        step: "2. 战略规划"
        output: "战略规划"
        time: "3h"
      - skill: /pitch
        step: "3. 战略汇报"
        output: "汇报材料"
        time: "2h"
      - skill: /review
        step: "4. 战略评估"
        output: "评估报告"
        time: "1h"
    total: "2-3天"

  - name: "风险管理"
    flow:
      - skill: /analyze
        step: "1. 风险识别"
        output: "风险识别"
        time: "2h"
      - skill: /modeling
        step: "2. 风险模型"
        output: "风险模型"
        time: "2h"
      - skill: /create
        step: "3. 风险预案"
        output: "风险预案"
        time: "2h"
      - skill: /execute
        step: "4. 风险监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

  - name: "合规管理"
    flow:
      - skill: /policy
        step: "1. 合规政策"
        output: "合规政策"
        time: "2h"
      - skill: /execute
        step: "2. 合规检查"
        output: "检查记录"
        time: "2h"
      - skill: /review
        step: "3. 合规审计"
        output: "审计报告"
        time: "2h"
      - skill: /create
        step: "4. 改进方案"
        output: "改进方案"
        time: "2h"
    total: "持续"

  - name: "团队管理"
    flow:
      - skill: /analyze
        step: "1. 团队分析"
        output: "团队分析"
        time: "2h"
      - skill: /create
        step: "2. 培养计划"
        output: "培养计划"
        time: "2h"
      - skill: /execute
        step: "3. 绩效管理"
        output: "绩效记录"
        time: "持续"
      - skill: /interview
        step: "4. 团队沟通"
        output: "沟通记录"
        time: "2h"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /create
  - /pitch
  - /review
  - /modeling
  - /policy
  - /interview
  - /mark

output:
  - "战略分析"
  - "战略规划"
  - "汇报材料"
  - "风险识别"
  - "风险模型"
  - "风险预案"
  - "合规政策"
  - "检查记录"
  - "审计报告"
  - "团队分析"
  - "培养计划"
  - "绩效记录"
  - "沟通记录"
