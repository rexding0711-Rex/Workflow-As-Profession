---
name: legal-secretary
description: "法务秘书工作流：文书→档案→日程→沟通→支持"

daily:
  - skill: /execute
    trigger: "整理文书、管理档案、安排日程"
    output: "秘书日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪日程、案件、会议"
    output: "秘书情报"
    time: "10min"
  - skill: /mark
    trigger: "标记紧急事项、文件、截止日期"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "文书处理"
    flow:
      - skill: /execute
        step: "1. 文书起草"
        output: "文书起草"
        time: "2h"
      - skill: /execute
        step: "2. 文书审核"
        output: "审核记录"
        time: "1h"
      - skill: /execute
        step: "3. 文书归档"
        output: "归档记录"
        time: "1h"
      - skill: /execute
        step: "4. 文书送达"
        output: "送达记录"
        time: "1h"
    total: "半天"

  - name: "档案管理"
    flow:
      - skill: /execute
        step: "1. 档案整理"
        output: "整理记录"
        time: "2h"
      - skill: /execute
        step: "2. 档案录入"
        output: "录入记录"
        time: "2h"
      - skill: /execute
        step: "3. 档案检索"
        output: "检索记录"
        time: "1h"
      - skill: /review
        step: "4. 档案审核"
        output: "审核记录"
        time: "1h"
    total: "半天"

  - name: "日程管理"
    flow:
      - skill: /plan
        step: "1. 日程安排"
        output: "日程安排"
        time: "1h"
      - skill: /execute
        step: "2. 会议组织"
        output: "会议组织"
        time: "2h"
      - skill: /execute
        step: "3. 提醒通知"
        output: "通知记录"
        time: "持续"
      - skill: /execute
        step: "4. 行程协调"
        output: "行程记录"
        time: "1h"
    total: "持续"

  - name: "客户沟通"
    flow:
      - skill: /interview
        step: "1. 客户接待"
        output: "接待记录"
        time: "1h"
      - skill: /execute
        step: "2. 电话沟通"
        output: "沟通记录"
        time: "持续"
      - skill: /execute
        step: "3. 邮件管理"
        output: "邮件记录"
        time: "持续"
      - skill: /execute
        step: "4. 费用管理"
        output: "费用记录"
        time: "1h"
    total: "持续"

skills:
  - /execute
  - /new-info
  - /plan
  - /interview
  - /review
  - /mark

output:
  - "文书起草"
  - "审核记录"
  - "归档记录"
  - "送达记录"
  - "整理记录"
  - "录入记录"
  - "检索记录"
  - "日程安排"
  - "会议组织"
  - "通知记录"
  - "行程记录"
  - "接待记录"
  - "费用记录"
