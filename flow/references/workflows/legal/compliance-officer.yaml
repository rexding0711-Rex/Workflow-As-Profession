---
name: compliance-officer
description: "合规官工作流：评估→监控→培训→调查→报告"

daily:
  - skill: /execute
    trigger: "审查合规、处理报告、跟踪整改"
    output: "合规日志"
    time: "持续"
  - skill: /monitor
    trigger: "跟踪合规指标、风险、案件"
    output: "合规监控"
    time: "15min"
  - skill: /mark
    trigger: "标记合规问题、风险、改进"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "合规评估"
    flow:
      - skill: /analyze
        step: "1. 风险评估"
        output: "风险评估"
        time: "2h"
      - skill: /policy
        step: "2. 政策审查"
        output: "政策审查"
        time: "2h"
      - skill: /analyze
        step: "3. 流程审查"
        output: "流程审查"
        time: "2h"
      - skill: /create
        step: "4. 评估报告"
        output: "评估报告"
        time: "2h"
    total: "1-2天"

  - name: "合规监控"
    flow:
      - skill: /monitor
        step: "1. 合规监控"
        output: "监控记录"
        time: "持续"
      - skill: /execute
        step: "2. 合规检查"
        output: "检查记录"
        time: "2h"
      - skill: /analyze
        step: "3. 违规分析"
        output: "违规分析"
        time: "2h"
      - skill: /create
        step: "4. 改进方案"
        output: "改进方案"
        time: "2h"
    total: "持续"

  - name: "合规培训"
    flow:
      - skill: /user-research
        step: "1. 培训需求"
        output: "培训需求"
        time: "2h"
      - skill: /create
        step: "2. 培训内容"
        output: "培训内容"
        time: "3h"
      - skill: /workshop
        step: "3. 培训实施"
        output: "培训记录"
        time: "3h"
      - skill: /review
        step: "4. 培训评估"
        output: "评估报告"
        time: "1h"
    total: "1-2天"

  - name: "违规调查"
    flow:
      - skill: /interview
        step: "1. 调查访谈"
        output: "访谈记录"
        time: "2h"
      - skill: /analyze
        step: "2. 证据分析"
        output: "证据分析"
        time: "2h"
      - skill: /create
        step: "3. 调查报告"
        output: "调查报告"
        time: "2h"
      - skill: /review
        step: "4. 处置建议"
        output: "处置建议"
        time: "1h"
    total: "1-2天"

skills:
  - /execute
  - /monitor
  - /analyze
  - /policy
  - /create
  - /user-research
  - /workshop
  - /interview
  - /review
  - /mark

output:
  - "风险评估"
  - "政策审查"
  - "流程审查"
  - "监控记录"
  - "检查记录"
  - "违规分析"
  - "培训需求"
  - "培训内容"
  - "培训记录"
  - "访谈记录"
  - "证据分析"
  - "调查报告"
  - "处置建议"
