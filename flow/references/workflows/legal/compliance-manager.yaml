---
name: compliance-manager
description: "合规经理工作流：体系→监控→审查→培训→报告"

daily:
  - skill: /execute
    trigger: "管理合规体系、审查流程、处理违规"
    output: "合规经理日志"
    time: "持续"
  - skill: /monitor
    trigger: "跟踪合规指标、风险、案件"
    output: "合规监控"
    time: "15min"
  - skill: /mark
    trigger: "标记合规风险、改进、机会"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "合规体系"
    flow:
      - skill: /analyze
        step: "1. 现状评估"
        output: "现状评估"
        time: "2h"
      - skill: /policy
        step: "2. 政策制定"
        output: "政策制定"
        time: "2h"
      - skill: /create
        step: "3. 制度编写"
        output: "制度编写"
        time: "3h"
      - skill: /review
        step: "4. 体系发布"
        output: "发布记录"
        time: "1h"
    total: "2-3天"

  - name: "合规监控"
    flow:
      - skill: /monitor
        step: "1. 日常监控"
        output: "监控记录"
        time: "持续"
      - skill: /execute
        step: "2. 合规检查"
        output: "检查记录"
        time: "2h"
      - skill: /analyze
        step: "3. 风险分析"
        output: "风险分析"
        time: "2h"
      - skill: /create
        step: "4. 监控报告"
        output: "监控报告"
        time: "1h"
    total: "持续"

  - name: "合规审查"
    flow:
      - skill: /analyze
        step: "1. 流程审查"
        output: "流程审查"
        time: "2h"
      - skill: /execute
        step: "2. 合规测试"
        output: "测试记录"
        time: "2h"
      - skill: /review
        step: "3. 审计配合"
        output: "审计记录"
        time: "2h"
      - skill: /create
        step: "4. 整改方案"
        output: "整改方案"
        time: "2h"
    total: "持续"

  - name: "合规培训"
    flow:
      - skill: /user-research
        step: "1. 需求调研"
        output: "需求调研"
        time: "1h"
      - skill: /create
        step: "2. 培训材料"
        output: "培训材料"
        time: "2h"
      - skill: /workshop
        step: "3. 培训实施"
        output: "培训记录"
        time: "2h"
      - skill: /review
        step: "4. 效果评估"
        output: "评估报告"
        time: "1h"
    total: "1-2天"

skills:
  - /execute
  - /monitor
  - /analyze
  - /policy
  - /create
  - /review
  - /user-research
  - /workshop
  - /mark

output:
  - "现状评估"
  - "政策制定"
  - "制度编写"
  - "监控记录"
  - "检查记录"
  - "风险分析"
  - "监控报告"
  - "流程审查"
  - "测试记录"
  - "审计记录"
  - "整改方案"
  - "需求调研"
  - "培训材料"
