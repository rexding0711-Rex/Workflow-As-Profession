---
name: ip-lawyer
description: "知识产权律师工作流：申请→保护→许可→维权→组合"

daily:
  - skill: /execute
    trigger: "管理IP、审查申请、处理侵权"
    output: "IP律师日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪IP法规、技术、市场"
    output: "IP律师情报"
    time: "15min"
  - skill: /mark
    trigger: "标记IP风险、机会、策略"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "专利申请"
    flow:
      - skill: /analyze
        step: "1. 可专利性分析"
        output: "可专利性分析"
        time: "2h"
      - skill: /create
        step: "2. 申请文件"
        output: "申请文件"
        time: "3h"
      - skill: /execute
        step: "3. 申请提交"
        output: "提交记录"
        time: "1h"
      - skill: /execute
        step: "4. 审查跟进"
        output: "跟进记录"
        time: "持续"
    total: "2-3天"

  - name: "商标保护"
    flow:
      - skill: /analyze
        step: "1. 商标检索"
        output: "商标检索"
        time: "2h"
      - skill: /create
        step: "2. 申请文件"
        output: "申请文件"
        time: "2h"
      - skill: /execute
        step: "3. 监测侵权"
        output: "监测记录"
        time: "持续"
      - skill: /execute
        step: "4. 异议处理"
        output: "异议记录"
        time: "持续"
    total: "持续"

  - name: "IP许可"
    flow:
      - skill: /analyze
        step: "1. 许可分析"
        output: "许可分析"
        time: "2h"
      - skill: /create
        step: "2. 许可协议"
        output: "许可协议"
        time: "3h"
      - skill: /negotiate
        step: "3. 许可谈判"
        output: "谈判记录"
        time: "2h"
      - skill: /execute
        step: "4. 许可管理"
        output: "管理记录"
        time: "持续"
    total: "持续"

  - name: "IP维权"
    flow:
      - skill: /analyze
        step: "1. 侵权分析"
        output: "侵权分析"
        time: "2h"
      - skill: /execute
        step: "2. 证据收集"
        output: "证据收集"
        time: "2h"
      - skill: /create
        step: "3. 维权方案"
        output: "维权方案"
        time: "2h"
      - skill: /execute
        step: "4. 诉讼仲裁"
        output: "诉讼记录"
        time: "持续"
    total: "持续"

skills:
  - /execute
  - /new-info
  - /analyze
  - /create
  - /negotiate
  - /mark

output:
  - "可专利性分析"
  - "申请文件"
  - "提交记录"
  - "商标检索"
  - "监测记录"
  - "异议记录"
  - "许可分析"
  - "许可协议"
  - "谈判记录"
  - "侵权分析"
  - "证据收集"
  - "维权方案"
  - "诉讼记录"
