---
name: digital-transformation
description: "数字化转型工作流：诊断→规划→实施→变革→评估"

daily:
  - skill: /execute
    trigger: "推进转型项目、协调变革、管理风险"
    output: "转型日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪数字技术、案例、最佳实践"
    output: "转型情报"
    time: "15min"
  - skill: /mark
    trigger: "标记转型障碍、机会、里程碑"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "转型诊断"
    flow:
      - skill: /interview
        step: "1. 高管访谈"
        output: "访谈记录"
        time: "2h"
      - skill: /analyze
        step: "2. 成熟度评估"
        output: "成熟度评估"
        time: "3h"
      - skill: /dd
        step: "3. 现状尽调"
        output: "尽调报告"
        time: "2h"
      - skill: /create
        step: "4. 诊断报告"
        output: "诊断报告"
        time: "2h"
    total: "2-3天"

  - name: "转型规划"
    flow:
      - skill: /analyze
        step: "1. 差距分析"
        output: "差距分析"
        time: "2h"
      - skill: /create
        step: "2. 转型蓝图"
        output: "转型蓝图"
        time: "3h"
      - skill: /modeling
        step: "3. 投资回报"
        output: "ROI模型"
        time: "2h"
      - skill: /pitch
        step: "4. 规划汇报"
        output: "汇报材料"
        time: "1h"
    total: "2-3天"

  - name: "转型实施"
    flow:
      - skill: /plan
        step: "1. 实施计划"
        output: "实施计划"
        time: "2h"
      - skill: /execute
        step: "2. 系统建设"
        output: "建设记录"
        time: "持续"
      - skill: /workshop
        step: "3. 变革管理"
        output: "变革记录"
        time: "3h"
      - skill: /monitor
        step: "4. 进度监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

  - name: "效果评估"
    flow:
      - skill: /analyze
        step: "1. 效果分析"
        output: "效果分析"
        time: "2h"
      - skill: /modeling
        step: "2. 价值度量"
        output: "价值度量"
        time: "2h"
      - skill: /create
        step: "3. 评估报告"
        output: "评估报告"
        time: "2h"
      - skill: /review
        step: "4. 持续改进"
        output: "改进方案"
        time: "1h"
    total: "持续"

skills:
  - /execute
  - /new-info
  - /interview
  - /analyze
  - /dd
  - /create
  - /modeling
  - /pitch
  - /plan
  - /workshop
  - /monitor
  - /review
  - /mark

output:
  - "访谈记录"
  - "成熟度评估"
  - "尽调报告"
  - "诊断报告"
  - "差距分析"
  - "转型蓝图"
  - "ROI模型"
  - "实施计划"
  - "建设记录"
  - "变革记录"
  - "效果分析"
  - "价值度量"
  - "评估报告"
