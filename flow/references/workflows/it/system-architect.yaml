---
name: system-architect
description: "系统架构师工作流：需求→架构→设计→评审→演进"

daily:
  - skill: /execute
    trigger: "设计架构、审查方案、技术决策"
    output: "架构日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪技术趋势、架构模式、行业方案"
    output: "架构情报"
    time: "15min"
  - skill: /mark
    trigger: "标记技术债务、架构风险、优化"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "架构规划"
    flow:
      - skill: /analyze
        step: "1. 需求分析"
        output: "需求分析"
        time: "2h"
      - skill: /design
        step: "2. 架构设计"
        output: "架构设计"
        time: "3h"
      - skill: /tech-compare
        step: "3. 技术选型"
        output: "技术选型"
        time: "2h"
      - skill: /review
        step: "4. 架构评审"
        output: "评审意见"
        time: "1h"
    total: "1-2天"

  - name: "详细设计"
    flow:
      - skill: /design
        step: "1. 模块设计"
        output: "模块设计"
        time: "3h"
      - skill: /design
        step: "2. 接口设计"
        output: "接口设计"
        time: "2h"
      - skill: /design
        step: "3. 数据设计"
        output: "数据设计"
        time: "2h"
      - skill: /review
        step: "4. 设计评审"
        output: "评审意见"
        time: "1h"
    total: "1-2天"

  - name: "架构治理"
    flow:
      - skill: /policy
        step: "1. 架构规范"
        output: "架构规范"
        time: "2h"
      - skill: /execute
        step: "2. 规范推广"
        output: "推广记录"
        time: "2h"
      - skill: /review
        step: "3. 合规审查"
        output: "审查记录"
        time: "2h"
      - skill: /create
        step: "4. 架构文档"
        output: "架构文档"
        time: "2h"
    total: "持续"

  - name: "架构演进"
    flow:
      - skill: /analyze
        step: "1. 现状分析"
        output: "现状分析"
        time: "2h"
      - skill: /design
        step: "2. 演进方案"
        output: "演进方案"
        time: "3h"
      - skill: /tech-compare
        step: "3. 技术验证"
        output: "验证报告"
        time: "2h"
      - skill: /execute
        step: "4. 渐进重构"
        output: "重构记录"
        time: "持续"
    total: "持续"

skills:
  - /execute
  - /new-info
  - /analyze
  - /design
  - /tech-compare
  - /review
  - /policy
  - /create
  - /mark

output:
  - "需求分析"
  - "架构设计"
  - "技术选型"
  - "模块设计"
  - "接口设计"
  - "数据设计"
  - "架构规范"
  - "推广记录"
  - "审查记录"
  - "架构文档"
  - "现状分析"
  - "演进方案"
  - "验证报告"
