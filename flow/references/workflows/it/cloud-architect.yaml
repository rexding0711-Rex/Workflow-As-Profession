---
name: cloud-architect
description: "云架构师工作流：需求→架构→迁移→成本→安全"

daily:
  - skill: /execute
    trigger: "设计云架构、审查方案、优化资源"
    output: "云架构日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪云技术、服务更新、定价变化"
    output: "云架构情报"
    time: "15min"
  - skill: /mark
    trigger: "标记架构风险、成本优化、安全漏洞"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "云架构设计"
    flow:
      - skill: /analyze
        step: "1. 需求分析"
        output: "需求分析"
        time: "2h"
      - skill: /design
        step: "2. 架构设计"
        output: "架构设计"
        time: "3h"
      - skill: /tech-compare
        step: "3. 云厂商选型"
        output: "选型报告"
        time: "2h"
      - skill: /review
        step: "4. 架构评审"
        output: "评审意见"
        time: "1h"
    total: "1-2天"

  - name: "上云迁移"
    flow:
      - skill: /plan
        step: "1. 迁移计划"
        output: "迁移计划"
        time: "2h"
      - skill: /execute
        step: "2. 数据迁移"
        output: "迁移记录"
        time: "3h"
      - skill: /experiment
        step: "3. 迁移测试"
        output: "测试报告"
        time: "2h"
      - skill: /execute
        step: "4. 切换验证"
        output: "切换记录"
        time: "1h"
    total: "2-3天"

  - name: "成本优化"
    flow:
      - skill: /analyze
        step: "1. 成本分析"
        output: "成本分析"
        time: "2h"
      - skill: /modeling
        step: "2. 成本模型"
        output: "成本模型"
        time: "2h"
      - skill: /execute
        step: "3. 资源优化"
        output: "优化记录"
        time: "2h"
      - skill: /monitor
        step: "4. 成本监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

  - name: "云安全"
    flow:
      - skill: /policy
        step: "1. 安全策略"
        output: "安全策略"
        time: "2h"
      - skill: /execute
        step: "2. 安全部署"
        output: "部署记录"
        time: "2h"
      - skill: /execute
        step: "3. 安全审计"
        output: "审计记录"
        time: "2h"
      - skill: /review
        step: "4. 合规评估"
        output: "评估报告"
        time: "1h"
    total: "持续"

skills:
  - /execute
  - /new-info
  - /analyze
  - /design
  - /tech-compare
  - /review
  - /plan
  - /experiment
  - /modeling
  - /monitor
  - /policy
  - /mark

output:
  - "需求分析"
  - "架构设计"
  - "选型报告"
  - "迁移计划"
  - "迁移记录"
  - "测试报告"
  - "成本分析"
  - "成本模型"
  - "优化记录"
  - "安全策略"
  - "部署记录"
  - "审计记录"
  - "评估报告"
