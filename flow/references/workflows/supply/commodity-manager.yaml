---
name: commodity-manager
description: "品类采购经理工作流：品类策略→支出分析→供应商管理→谈判→合同"

daily:
  - skill: /monitor
    trigger: "跟踪品类支出、市场价格、供应商绩效"
    output: "品类监控"
    time: "15min"
  - skill: /new-info
    trigger: "扫描原材料价格趋势、新供应商、替代材料"
    output: "品类情报"
    time: "10min"
  - skill: /mark
    trigger: "标记成本节约机会、供应风险、市场变化"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "品类策略"
    flow:
      - skill: /analyze
        step: "1. 支出分析（Spend Analysis）"
        output: "支出分析"
        time: "3h"
      - skill: /market-search
        step: "2. 供应市场分析"
        output: "市场分析"
        time: "2h"
      - skill: /modeling
        step: "3. 总拥有成本模型（TCO）"
        output: "TCO模型"
        time: "2h"
      - skill: /create
        step: "4. 品类采购策略"
        output: "品类策略"
        time: "2h"
    total: "1-2天"
  - name: "战略寻源"
    flow:
      - skill: /sourcing
        step: "1. 供应商搜寻与短名单"
        output: "短名单"
        time: "2h"
      - skill: /negotiate
        step: "2. 谈判策略与执行"
        output: "谈判方案"
        time: "3h"
      - skill: /deal
        step: "3. 合同条款设计"
        output: "合同草案"
        time: "2h"
      - skill: /execute
        step: "4. 供应商导入与过渡"
        output: "导入计划"
        time: "持续"
    total: "1-2周"

skills:
  - /monitor
  - /new-info
  - /mark
  - /analyze
  - /market-search
  - /modeling
  - /create
  - /sourcing
  - /negotiate
  - /deal
  - /execute

output:
  - "支出分析报告"
  - "供应市场分析"
  - "TCO模型"
  - "品类采购策略"
  - "供应商短名单"
  - "谈判方案"
  - "合同草案"