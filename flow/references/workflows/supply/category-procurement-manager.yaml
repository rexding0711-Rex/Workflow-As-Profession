---
name: category-procurement-manager
description: "品类采购经理工作流：品类→寻源→谈判→合同→供应商绩效"

daily:
  - skill: /monitor
    trigger: "跟踪品类支出/合同履约/供应商绩效/市场行情"
    output: "品类采购看板"
    time: "15min"
  - skill: /new-info
    trigger: "扫描原材料价格/新供应商/替代方案"
    output: "采购情报"
    time: "5min"
  - skill: /mark
    trigger: "标记成本节约/供应风险/合同到期"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "品类管理"
    flow:
      - skill: /analyze
        step: "1. 支出分析与品类画像"
        output: "支出分析"
        time: "3h"
      - skill: /market-search
        step: "2. 供应市场研究"
        output: "市场报告"
        time: "2h"
      - skill: /create
        step: "3. 品类采购策略"
        output: "品类策略"
        time: "2h"
      - skill: /plan
        step: "4. 寻源计划"
        output: "寻源计划"
        time: "1h"
    total: "1-2天"
  - name: "战略寻源"
    flow:
      - skill: /sourcing
        step: "1. 供应商搜寻与RFx"
        output: "RFx文件"
        time: "3h"
      - skill: /negotiate
        step: "2. 谈判与定价"
        output: "谈判记录"
        time: "3h"
      - skill: /deal
        step: "3. 合同签署"
        output: "合同"
        time: "2h"
      - skill: /execute
        step: "4. 供应商导入"
        output: "导入计划"
        time: "持续"
    total: "1-2周"

skills:
  - /monitor
  - /new-info
  - /mark
  - /analyze
  - /market-search
  - /create
  - /plan
  - /sourcing
  - /negotiate
  - /deal
  - /execute

output:
  - "支出分析"
  - "供应市场报告"
  - "品类采购策略"
  - "RFx文件"
  - "谈判记录"
  - "合同"