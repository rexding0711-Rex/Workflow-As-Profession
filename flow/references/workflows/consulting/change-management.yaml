---
name: change-management
description: "变革管理工作流：诊断→规划→实施→沟通→固化"

daily:
  - skill: /execute
    trigger: "推动变革、沟通、培训"
    output: "变革日志"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪变革进度、阻力、效果"
    output: "变革监控"
    time: "10min"
  - skill: /mark
    trigger: "标记阻力点、突破、风险"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "变革诊断"
    flow:
      - skill: /interview
        step: "1. 组织访谈"
        output: "访谈记录"
        time: "2h"
      - skill: /analyze
        step: "2. 变革准备度"
        output: "准备度分析"
        time: "2h"
      - skill: /user-research
        step: "3. 员工调研"
        output: "调研报告"
        time: "2h"
      - skill: /create
        step: "4. 诊断报告"
        output: "诊断报告"
        time: "2h"
    total: "2-3天"

  - name: "变革规划"
    flow:
      - skill: /plan
        step: "1. 变革计划"
        output: "变革计划"
        time: "3h"
      - skill: /create
        step: "2. 沟通方案"
        output: "沟通方案"
        time: "2h"
      - skill: /create
        step: "3. 培训方案"
        output: "培训方案"
        time: "2h"
      - skill: /pitch
        step: "4. 方案汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

  - name: "变革实施"
    flow:
      - skill: /execute
        step: "1. 变革执行"
        output: "执行记录"
        time: "持续"
      - skill: /workshop
        step: "2. 培训工作坊"
        output: "工作坊记录"
        time: "3h"
      - skill: /monitor
        step: "3. 进度监控"
        output: "监控记录"
        time: "持续"
      - skill: /execute
        step: "4. 阻力处理"
        output: "处理记录"
        time: "持续"
    total: "持续"

  - name: "变革固化"
    flow:
      - skill: /analyze
        step: "1. 效果评估"
        output: "效果评估"
        time: "2h"
      - skill: /process
        step: "2. 流程固化"
        output: "流程固化"
        time: "2h"
      - skill: /review
        step: "3. 变革复盘"
        output: "复盘报告"
        time: "1h"
      - skill: /create
        step: "4. 持续改进"
        output: "改进方案"
        time: "2h"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /interview
  - /analyze
  - /user-research
  - /create
  - /plan
  - /pitch
  - /workshop
  - /process
  - /review
  - /mark

output:
  - "访谈记录"
  - "准备度分析"
  - "调研报告"
  - "诊断报告"
  - "变革计划"
  - "沟通方案"
  - "培训方案"
  - "执行记录"
  - "工作坊记录"
  - "监控记录"
  - "效果评估"
  - "流程固化"
  - "复盘报告"
  - "改进方案"
