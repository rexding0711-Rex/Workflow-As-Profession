---
name: tax-advisor
description: "税务顾问工作流：分析→政策→筹划→合规→申报"

daily:
  - skill: /new-info
    trigger: "跟踪税务政策、法规变化、行业动态"
    output: "税务情报"
    time: "15min"
  - skill: /analyze
    trigger: "分析客户税务数据、税负、风险"
    output: "税务仪表盘"
    time: "10min"
  - skill: /mark
    trigger: "标记税务洞察、政策机会、风险"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "税务筹划"
    flow:
      - skill: /analyze
        step: "1. 税务状况分析"
        output: "税务分析"
        time: "2h"
      - skill: /policy
        step: "2. 税收政策研究"
        output: "政策研究"
        time: "2h"
      - skill: /modeling
        step: "3. 税务筹划模型"
        output: "筹划模型"
        time: "2h"
      - skill: /create
        step: "4. 税务筹划方案"
        output: "筹划方案"
        time: "2h"
    total: "1-2天"

  - name: "税务合规"
    flow:
      - skill: /analyze
        step: "1. 税务合规检查"
        output: "合规检查"
        time: "2h"
      - skill: /policy
        step: "2. 合规政策研究"
        output: "政策研究"
        time: "2h"
      - skill: /process
        step: "3. 合规流程设计"
        output: "流程设计"
        time: "2h"
      - skill: /execute
        step: "4. 合规执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

  - name: "税务申报"
    flow:
      - skill: /analyze
        step: "1. 申报数据准备"
        output: "数据准备"
        time: "2h"
      - skill: /create
        step: "2. 申报文件制作"
        output: "申报文件"
        time: "2h"
      - skill: /execute
        step: "3. 申报执行"
        output: "申报记录"
        time: "1h"
      - skill: /review
        step: "4. 申报复核"
        output: "复核报告"
        time: "1h"
    total: "1天"

  - name: "税务争议"
    flow:
      - skill: /analyze
        step: "1. 争议分析"
        output: "争议分析"
        time: "2h"
      - skill: /policy
        step: "2. 法律依据研究"
        output: "法律研究"
        time: "2h"
      - skill: /create
        step: "3. 应对策略"
        output: "应对策略"
        time: "2h"
      - skill: /execute
        step: "4. 争议处理"
        output: "处理记录"
        time: "持续"
    total: "持续"

skills:
  - /new-info
  - /analyze
  - /policy
  - /modeling
  - /create
  - /process
  - /execute
  - /review
  - /mark

output:
  - "税务分析"
  - "政策研究"
  - "筹划模型"
  - "筹划方案"
  - "合规检查"
  - "流程设计"
  - "数据准备"
  - "申报文件"
  - "争议分析"
  - "法律研究"
  - "应对策略"
