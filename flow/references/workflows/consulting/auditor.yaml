---
name: auditor
description: "审计师工作流：计划→尽调→测试→报告→整改"

daily:
  - skill: /analyze
    trigger: "分析审计数据、异常、风险指标"
    output: "审计仪表盘"
    time: "15min"
  - skill: /monitor
    trigger: "监控审计进度、问题跟踪、整改状态"
    output: "审计监控"
    time: "10min"
  - skill: /mark
    trigger: "标记审计发现、风险、建议"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "财务审计"
    flow:
      - skill: /plan
        step: "1. 审计计划"
        output: "审计计划"
        time: "2h"
      - skill: /dd
        step: "2. 财务尽调"
        output: "尽调报告"
        time: "3h"
      - skill: /analyze
        step: "3. 财务数据分析"
        output: "财务分析"
        time: "3h"
      - skill: /create
        step: "4. 审计报告"
        output: "审计报告"
        time: "3h"
    total: "2-3天"

  - name: "合规审计"
    flow:
      - skill: /policy
        step: "1. 合规政策研究"
        output: "政策研究"
        time: "2h"
      - skill: /process
        step: "2. 合规流程检查"
        output: "流程检查"
        time: "2h"
      - skill: /analyze
        step: "3. 合规数据分析"
        output: "合规分析"
        time: "2h"
      - skill: /create
        step: "4. 合规报告"
        output: "合规报告"
        time: "2h"
    total: "1-2天"

  - name: "运营审计"
    flow:
      - skill: /process
        step: "1. 运营流程梳理"
        output: "流程梳理"
        time: "2h"
      - skill: /analyze
        step: "2. 运营效率分析"
        output: "效率分析"
        time: "2h"
      - skill: /experiment
        step: "3. 控制测试"
        output: "测试报告"
        time: "2h"
      - skill: /create
        step: "4. 运营审计报告"
        output: "审计报告"
        time: "2h"
    total: "1-2天"

  - name: "整改跟踪"
    flow:
      - skill: /analyze
        step: "1. 整改方案分析"
        output: "整改分析"
        time: "2h"
      - skill: /execute
        step: "2. 整改跟踪"
        output: "跟踪记录"
        time: "持续"
      - skill: /monitor
        step: "3. 整改效果监控"
        output: "效果监控"
        time: "持续"
      - skill: /review
        step: "4. 整改复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

skills:
  - /analyze
  - /monitor
  - /plan
  - /dd
  - /policy
  - /process
  - /create
  - /experiment
  - /execute
  - /review
  - /mark

output:
  - "审计计划"
  - "尽调报告"
  - "财务分析"
  - "审计报告"
  - "政策研究"
  - "流程检查"
  - "合规分析"
  - "合规报告"
  - "效率分析"
  - "测试报告"
  - "整改分析"
  - "跟踪记录"
