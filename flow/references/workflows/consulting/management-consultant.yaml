---
name: management-consultant
description: "管理顾问工作流：诊断→流程→组织→绩效→变革"

daily:
  - skill: /new-info
    trigger: "扫描管理趋势、案例、最佳实践"
    output: "管理情报"
    time: "10min"
  - skill: /analyze
    trigger: "分析客户管理数据、绩效指标"
    output: "管理仪表盘"
    time: "10min"
  - skill: /mark
    trigger: "标记管理洞察、流程问题、改进点"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "组织诊断"
    flow:
      - skill: /interview
        step: "1. 管理层访谈"
        output: "访谈记录"
        time: "3h"
      - skill: /analyze
        step: "2. 组织效能分析"
        output: "效能分析"
        time: "3h"
      - skill: /process
        step: "3. 流程与结构梳理"
        output: "流程梳理"
        time: "2h"
      - skill: /pitch
        step: "4. 诊断汇报"
        output: "诊断汇报"
        time: "1h"
    total: "1-2天"

  - name: "流程优化"
    flow:
      - skill: /process
        step: "1. 现有流程梳理"
        output: "流程梳理"
        time: "2h"
      - skill: /analyze
        step: "2. 瓶颈与浪费分析"
        output: "瓶颈分析"
        time: "2h"
      - skill: /create
        step: "3. 优化方案设计"
        output: "优化方案"
        time: "2h"
      - skill: /execute
        step: "4. 优化执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

  - name: "组织变革"
    flow:
      - skill: /analyze
        step: "1. 变革准备度分析"
        output: "准备度分析"
        time: "2h"
      - skill: /plan
        step: "2. 变革计划设计"
        output: "变革计划"
        time: "2h"
      - skill: /workshop
        step: "3. 变革培训与工作坊"
        output: "培训方案"
        time: "3h"
      - skill: /execute
        step: "4. 变革执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

  - name: "绩效管理"
    flow:
      - skill: /analyze
        step: "1. 绩效数据分析"
        output: "绩效分析"
        time: "2h"
      - skill: /create
        step: "2. 绩效体系设计"
        output: "绩效方案"
        time: "3h"
      - skill: /execute
        step: "3. 绩效体系实施"
        output: "实施记录"
        time: "持续"
      - skill: /review
        step: "4. 绩效复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

skills:
  - /new-info
  - /analyze
  - /interview
  - /process
  - /pitch
  - /create
  - /execute
  - /workshop
  - /plan
  - /review
  - /mark

output:
  - "访谈记录"
  - "效能分析"
  - "流程梳理"
  - "诊断汇报"
  - "瓶颈分析"
  - "优化方案"
  - "准备度分析"
  - "变革计划"
  - "绩效分析"
  - "绩效方案"
  - "复盘报告"
