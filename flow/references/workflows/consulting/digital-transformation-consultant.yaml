---
name: digital-transformation-consultant
description: "数字化转型顾问工作流：评估→战略→技术→实施→文化"

daily:
  - skill: /new-info
    trigger: "扫描数字化趋势、技术演进、行业案例"
    output: "数字化情报"
    time: "15min"
  - skill: /analyze
    trigger: "分析客户数字化成熟度、技术债务、能力差距"
    output: "数字化仪表盘"
    time: "15min"
  - skill: /mark
    trigger: "标记数字化洞察、技术机会、变革阻力"
    output: "结构化标签"
    time: "10min"

projects:
  - name: "数字化评估"
    flow:
      - skill: /interview
        step: "1. 高管与IT访谈"
        output: "访谈记录"
        time: "3h"
      - skill: /analyze
        step: "2. 数字化成熟度评估"
        output: "成熟度评估"
        time: "3h"
      - skill: /dd
        step: "3. 技术与数据尽调"
        output: "尽调报告"
        time: "3h"
      - skill: /pitch
        step: "4. 评估汇报"
        output: "评估汇报"
        time: "1h"
    total: "2天"

  - name: "数字化战略"
    flow:
      - skill: /modeling
        step: "1. 数字化场景建模"
        output: "场景模型"
        time: "3h"
      - skill: /tech-compare
        step: "2. 技术架构对比"
        output: "技术对比"
        time: "2h"
      - skill: /create
        step: "3. 数字化战略文档"
        output: "战略规划"
        time: "4h"
      - skill: /workshop
        step: "4. 战略对齐工作坊"
        output: "工作坊方案"
        time: "3h"
    total: "2-3天"

  - name: "技术实施"
    flow:
      - skill: /design
        step: "1. 技术架构设计"
        output: "架构设计"
        time: "3h"
      - skill: /execute
        step: "2. 技术实施"
        output: "实施记录"
        time: "持续"
      - skill: /monitor
        step: "3. 实施监控"
        output: "监控报告"
        time: "持续"
      - skill: /review
        step: "4. 实施复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

  - name: "组织变革"
    flow:
      - skill: /analyze
        step: "1. 变革准备度分析"
        output: "准备度分析"
        time: "2h"
      - skill: /process
        step: "2. 新流程设计"
        output: "流程设计"
        time: "2h"
      - skill: /workshop
        step: "3. 变革培训"
        output: "培训方案"
        time: "3h"
      - skill: /execute
        step: "4. 变革执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

skills:
  - /new-info
  - /analyze
  - /interview
  - /dd
  - /modeling
  - /tech-compare
  - /create
  - /workshop
  - /design
  - /execute
  - /monitor
  - /review
  - /process
  - /pitch
  - /mark

output:
  - "访谈记录"
  - "成熟度评估"
  - "尽调报告"
  - "场景模型"
  - "技术对比"
  - "战略规划"
  - "架构设计"
  - "监控报告"
  - "准备度分析"
  - "流程设计"
  - "培训方案"
  - "复盘报告"
