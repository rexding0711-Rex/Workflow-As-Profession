---
name: supply-chain-consultant
description: "供应链顾问工作流：诊断→网络→库存→采购→物流"

daily:
  - skill: /analyze
    trigger: "分析供应链数据、库存、物流、成本"
    output: "供应链仪表盘"
    time: "15min"
  - skill: /monitor
    trigger: "监控供应链KPI、风险、异常"
    output: "供应链监控"
    time: "10min"
  - skill: /mark
    trigger: "标记供应链洞察、瓶颈、改进点"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "供应链诊断"
    flow:
      - skill: /interview
        step: "1. 供应链团队访谈"
        output: "访谈记录"
        time: "2h"
      - skill: /analyze
        step: "2. 供应链数据分析"
        output: "供应链分析"
        time: "3h"
      - skill: /process
        step: "3. 供应链流程梳理"
        output: "流程梳理"
        time: "2h"
      - skill: /pitch
        step: "4. 诊断汇报"
        output: "诊断汇报"
        time: "1h"
    total: "1-2天"

  - name: "网络优化"
    flow:
      - skill: /modeling
        step: "1. 供应链网络建模"
        output: "网络模型"
        time: "3h"
      - skill: /analyze
        step: "2. 网络优化分析"
        output: "优化分析"
        time: "3h"
      - skill: /create
        step: "3. 网络优化方案"
        output: "优化方案"
        time: "2h"
      - skill: /execute
        step: "4. 方案执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

  - name: "库存优化"
    flow:
      - skill: /analyze
        step: "1. 库存数据分析"
        output: "库存分析"
        time: "2h"
      - skill: /modeling
        step: "2. 库存优化模型"
        output: "库存模型"
        time: "2h"
      - skill: /create
        step: "3. 库存策略"
        output: "库存策略"
        time: "2h"
      - skill: /execute
        step: "4. 策略执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

  - name: "供应商管理"
    flow:
      - skill: /analyze
        step: "1. 供应商评估"
        output: "供应商评估"
        time: "2h"
      - skill: /dd
        step: "2. 供应商尽调"
        output: "尽调报告"
        time: "2h"
      - skill: /create
        step: "3. 供应商管理方案"
        output: "管理方案"
        time: "2h"
      - skill: /execute
        step: "4. 方案执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

skills:
  - /analyze
  - /monitor
  - /interview
  - /process
  - /modeling
  - /create
  - /execute
  - /dd
  - /pitch
  - /mark

output:
  - "访谈记录"
  - "供应链分析"
  - "流程梳理"
  - "网络模型"
  - "优化分析"
  - "优化方案"
  - "库存分析"
  - "库存模型"
  - "库存策略"
  - "供应商评估"
  - "尽调报告"
  - "管理方案"
