---
name: due-diligence
description: "尽调工作流：财务→法律→业务→技术→风险"

daily:
  - skill: /analyze
    trigger: "跟踪尽调进度、发现、问题"
    output: "尽调日志"
    time: "15min"
  - skill: /monitor
    trigger: "监控数据质量、配合度、风险"
    output: "尽调监控"
    time: "10min"
  - skill: /mark
    trigger: "标记关键发现、风险、建议"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "财务尽调"
    flow:
      - skill: /dd
        step: "1. 财务资料收集"
        output: "资料清单"
        time: "2h"
      - skill: /analyze
        step: "2. 财务分析"
        output: "财务分析"
        time: "3h"
      - skill: /modeling
        step: "3. 财务模型"
        output: "财务模型"
        time: "2h"
      - skill: /create
        step: "4. 财务报告"
        output: "财务报告"
        time: "2h"
    total: "2-3天"

  - name: "法律尽调"
    flow:
      - skill: /dd
        step: "1. 法律资料收集"
        output: "资料清单"
        time: "2h"
      - skill: /policy
        step: "2. 法律审查"
        output: "法律审查"
        time: "3h"
      - skill: /analyze
        step: "3. 合规分析"
        output: "合规分析"
        time: "2h"
      - skill: /create
        step: "4. 法律报告"
        output: "法律报告"
        time: "2h"
    total: "2-3天"

  - name: "业务尽调"
    flow:
      - skill: /interview
        step: "1. 管理层访谈"
        output: "访谈记录"
        time: "2h"
      - skill: /analyze
        step: "2. 业务分析"
        output: "业务分析"
        time: "3h"
      - skill: /market-search
        step: "3. 市场分析"
        output: "市场分析"
        time: "2h"
      - skill: /create
        step: "4. 业务报告"
        output: "业务报告"
        time: "2h"
    total: "2-3天"

  - name: "尽调报告"
    flow:
      - skill: /analyze
        step: "1. 数据汇总"
        output: "数据汇总"
        time: "2h"
      - skill: /visual
        step: "2. 可视化"
        output: "可视化报告"
        time: "2h"
      - skill: /create
        step: "3. 综合报告"
        output: "综合报告"
        time: "3h"
      - skill: /pitch
        step: "4. 报告汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

skills:
  - /analyze
  - /monitor
  - /dd
  - /modeling
  - /policy
  - /interview
  - /market-search
  - /create
  - /visual
  - /pitch
  - /mark

output:
  - "资料清单"
  - "财务分析"
  - "财务模型"
  - "财务报告"
  - "法律审查"
  - "合规分析"
  - "法律报告"
  - "访谈记录"
  - "业务分析"
  - "市场分析"
  - "业务报告"
  - "数据汇总"
  - "可视化报告"
  - "综合报告"
  - "汇报材料"
