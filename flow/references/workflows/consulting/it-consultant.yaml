---
name: it-consultant
description: "IT顾问工作流：评估→架构→技术对比→实施→迁移"

daily:
  - skill: /new-info
    trigger: "扫描技术趋势、架构方案、最佳实践"
    output: "技术情报"
    time: "10min"
  - skill: /analyze
    trigger: "分析客户IT架构、系统性能、安全风险"
    output: "IT仪表盘"
    time: "10min"
  - skill: /mark
    trigger: "标记技术洞察、架构问题、机会"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "IT评估"
    flow:
      - skill: /interview
        step: "1. IT团队访谈"
        output: "访谈记录"
        time: "2h"
      - skill: /analyze
        step: "2. IT架构评估"
        output: "架构评估"
        time: "3h"
      - skill: /dd
        step: "3. 系统与数据尽调"
        output: "尽调报告"
        time: "3h"
      - skill: /pitch
        step: "4. 评估汇报"
        output: "评估汇报"
        time: "1h"
    total: "1-2天"

  - name: "架构设计"
    flow:
      - skill: /design
        step: "1. IT架构设计"
        output: "架构设计"
        time: "3h"
      - skill: /tech-compare
        step: "2. 技术选型对比"
        output: "选型对比"
        time: "2h"
      - skill: /create
        step: "3. 架构文档"
        output: "架构文档"
        time: "2h"
      - skill: /review
        step: "4. 架构评审"
        output: "评审意见"
        time: "1h"
    total: "1-2天"

  - name: "数字化转型"
    flow:
      - skill: /analyze
        step: "1. 数字化成熟度评估"
        output: "成熟度评估"
        time: "2h"
      - skill: /plan
        step: "2. 数字化路线图"
        output: "路线图"
        time: "3h"
      - skill: /execute
        step: "3. 数字化实施"
        output: "实施记录"
        time: "持续"
      - skill: /review
        step: "4. 数字化复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

  - name: "IT治理"
    flow:
      - skill: /policy
        step: "1. IT治理政策"
        output: "治理政策"
        time: "2h"
      - skill: /process
        step: "2. IT流程设计"
        output: "流程设计"
        time: "2h"
      - skill: /execute
        step: "3. IT治理执行"
        output: "执行记录"
        time: "持续"
      - skill: /review
        step: "4. IT审计"
        output: "审计报告"
        time: "2h"
    total: "持续"

skills:
  - /new-info
  - /analyze
  - /interview
  - /dd
  - /design
  - /tech-compare
  - /create
  - /review
  - /plan
  - /execute
  - /policy
  - /process
  - /pitch
  - /mark

output:
  - "访谈记录"
  - "架构评估"
  - "尽调报告"
  - "架构设计"
  - "选型对比"
  - "成熟度评估"
  - "路线图"
  - "治理政策"
  - "流程设计"
  - "审计报告"
  - "评估汇报"
