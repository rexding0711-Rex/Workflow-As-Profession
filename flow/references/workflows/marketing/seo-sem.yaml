---
name: seo-sem
description: "SEO/SEM工作流：GEO→数据分析→关键词→投放→内容"

daily:
  - skill: /monitor
    trigger: "跟踪排名、流量、转化率、投放数据"
    output: "SEO仪表盘"
    time: "15min"
  - skill: /new-info
    trigger: "扫描算法更新、竞品SEO动态、行业热点"
    output: "SEO情报"
    time: "10min"
  - skill: /mark
    trigger: "标记关键词变化、流量异常、优化机会"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "关键词策略"
    flow:
      - skill: /analyze
        step: "1. 关键词研究与竞争分析"
        output: "关键词报告"
        time: "2h"
      - skill: /modeling
        step: "2. 关键词价值与流量模型"
        output: "流量模型"
        time: "2h"
      - skill: /geo
        step: "3. GEO关键词策略"
        output: "GEO方案"
        time: "2h"
      - skill: /decide
        step: "4. 关键词优先级决策"
        output: "优先级"
        time: "1h"
    total: "1-2天"

  - name: "SEO优化"
    flow:
      - skill: /analyze
        step: "1. 网站技术SEO审计"
        output: "审计报告"
        time: "2h"
      - skill: /tech-article
        step: "2. 内容优化与创作"
        output: "优化内容"
        time: "3h"
      - skill: /experiment
        step: "3. SEO A/B测试"
        output: "测试结果"
        time: "2周"
      - skill: /execute
        step: "4. 优化执行"
        output: "执行计划"
        time: "持续"
    total: "持续"

  - name: "SEM投放"
    flow:
      - skill: /modeling
        step: "1. 投放预算与出价模型"
        output: "预算模型"
        time: "2h"
      - skill: /analyze
        step: "2. 广告效果分析"
        output: "效果分析"
        time: "2h"
      - skill: /experiment
        step: "3. 广告A/B测试"
        output: "测试结果"
        time: "2周"
      - skill: /execute
        step: "4. 投放优化执行"
        output: "优化计划"
        time: "持续"
    total: "持续"

  - name: "SEO汇报"
    flow:
      - skill: /analyze
        step: "1. SEO数据汇总"
        output: "数据汇总"
        time: "2h"
      - skill: /visual
        step: "2. 数据可视化"
        output: "可视化报告"
        time: "2h"
      - skill: /pitch
        step: "3. 管理层汇报"
        output: "汇报材料"
        time: "1h"
    total: "1天"

skills:
  - /monitor
  - /new-info
  - /analyze
  - /modeling
  - /geo
  - /decide
  - /tech-article
  - /experiment
  - /execute
  - /visual
  - /pitch
  - /mark

output:
  - "关键词报告"
  - "流量模型"
  - "GEO方案"
  - "审计报告"
  - "优化内容"
  - "预算模型"
  - "效果分析"
  - "可视化报告"
