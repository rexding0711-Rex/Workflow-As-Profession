---
name: event-manager
description: "活动经理工作流：活动策划→执行→预算→供应商→会议"

daily:
  - skill: /execute
    trigger: "跟踪活动进度、供应商、物料"
    output: "执行仪表盘"
    time: "15min"
  - skill: /monitor
    trigger: "监控活动预算、时间线、风险"
    output: "监控摘要"
    time: "10min"
  - skill: /mark
    trigger: "标记关键节点、风险、供应商问题"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "活动策划"
    flow:
      - skill: /market-search
        step: "1. 活动目标与受众分析"
        output: "受众分析"
        time: "2h"
      - skill: /create
        step: "2. 活动创意与方案设计"
        output: "活动方案"
        time: "3h"
      - skill: /modeling
        step: "3. 活动预算与ROI模型"
        output: "预算模型"
        time: "2h"
      - skill: /decide
        step: "4. 活动方案决策"
        output: "决策方案"
        time: "1h"
    total: "1-2天"

  - name: "供应商管理"
    flow:
      - skill: /sourcing
        step: "1. 供应商寻源与评估"
        output: "供应商评估"
        time: "2h"
      - skill: /deal
        step: "2. 合同谈判"
        output: "谈判策略"
        time: "1h"
      - skill: /execute
        step: "3. 供应商管理"
        output: "管理计划"
        time: "持续"
    total: "1-2天"

  - name: "活动执行"
    flow:
      - skill: /process
        step: "1. 活动流程与SOP"
        output: "活动SOP"
        time: "2h"
      - skill: /execute
        step: "2. 活动现场执行"
        output: "执行记录"
        time: "持续"
      - skill: /monitor
        step: "3. 实时监控与调整"
        output: "调整记录"
        time: "持续"
    total: "持续"

  - name: "活动复盘"
    flow:
      - skill: /analyze
        step: "1. 活动数据与效果分析"
        output: "效果分析"
        time: "2h"
      - skill: /review
        step: "2. 活动复盘"
        output: "复盘报告"
        time: "1h"
      - skill: /network
        step: "3. 参与者关系维护"
        output: "关系计划"
        time: "1h"
    total: "1-2天"

skills:
  - /execute
  - /monitor
  - /market-search
  - /create
  - /modeling
  - /decide
  - /sourcing
  - /deal
  - /process
  - /analyze
  - /review
  - /network
  - /mark

output:
  - "受众分析"
  - "活动方案"
  - "预算模型"
  - "供应商评估"
  - "活动SOP"
  - "执行记录"
  - "效果分析"
  - "复盘报告"
