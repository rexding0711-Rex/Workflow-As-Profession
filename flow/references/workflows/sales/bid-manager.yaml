---
name: bid-manager
description: "招投标专员工作流：招标信息→标书分析→方案编制→报价策略→合规审查→述标准备→投标执行"

daily:
  - skill: /new-info
    trigger: "扫描招标公告、采购平台、客户招标动态"
    output: "招标情报清单"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪在投项目进度、答疑截止时间、开标时间"
    output: "投标日历提醒"
    time: "10min"
  - skill: /mark
    trigger: "标记评分标准变化、资质缺口、竞争对手动向"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "招标机会筛选"
    flow:
      - skill: /new-info
        step: "1. 招标信息收集（平台/客户/关系）"
        output: "招标清单"
        time: "1h"
      - skill: /quick
        step: "2. 5分钟快速筛选（资质匹配/利润/竞争）"
        output: "投标/不投/跟进"
        time: "5min/项"
      - skill: /analyze
        step: "3. 竞争对手历史中标分析"
        output: "竞争格局"
        time: "2h"
      - skill: /decide
        step: "4. 投标优先级决策矩阵"
        output: "投标优先级"
        time: "1h"
    total: "1-2天"

  - name: "标书分析"
    flow:
      - skill: /summary
        step: "1. 招标文件摘要（技术/商务/评分）"
        output: "标书核心要点"
        time: "1h"
      - skill: /analyze
        step: "2. 评分标准拆解（权重/得分点/门槛）"
        output: "评分矩阵"
        time: "2h"
      - skill: /process
        step: "3. 投标流程与时间节点梳理"
        output: "投标时间表"
        time: "1h"
      - skill: /deal
        step: "4. 合同条款与风险条款审查"
        output: "风险清单"
        time: "1h"
      - skill: /policy
        step: "5. 合规要求与资质审查"
        output: "资质缺口"
        time: "1h"
    total: "1-2天"

  - name: "技术方案编制"
    flow:
      - skill: /tech-compare
        step: "1. 技术方案对比与选型"
        output: "技术方案"
        time: "2h"
      - skill: /sales
        step: "2. 技术方案书撰写（Solution Proposal）"
        output: "技术标书"
        time: "4h"
      - skill: /user-research
        step: "3. 客户需求验证（如有澄清机会）"
        output: "需求确认"
        time: "1h"
      - skill: /visual
        step: "4. 方案可视化（图表/架构图）"
        output: "可视化方案"
        time: "2h"
      - skill: /review
        step: "5. 技术方案评审"
        output: "评审意见"
        time: "1h"
    total: "2-3天"

  - name: "商务报价"
    flow:
      - skill: /pricing
        step: "1. 定价策略（竞争定价/成本加成/价值定价）"
        output: "定价策略"
        time: "2h"
      - skill: /modeling
        step: "2. 成本测算与利润模型"
        output: "成本模型"
        time: "2h"
      - skill: /analyze
        step: "3. 竞争对手历史报价分析"
        output: "报价参考"
        time: "1h"
      - skill: /decide
        step: "4. 报价决策（价格/折扣/付款条件）"
        output: "报价决策"
        time: "1h"
      - skill: /deal
        step: "5. 商务条款审查"
        output: "条款审查"
        time: "1h"
    total: "1-2天"

  - name: "合规与资质"
    flow:
      - skill: /policy
        step: "1. 招标合规要求审查"
        output: "合规清单"
        time: "1h"
      - skill: /format
        step: "2. 资质文件整理与标准化"
        output: "资质包"
        time: "2h"
      - skill: /deal
        step: "3. 法律风险审查（保证金/履约/质保）"
        output: "法律风险"
        time: "1h"
      - skill: /process
        step: "4. 投标流程合规检查"
        output: "合规检查表"
        time: "1h"
    total: "1天"

  - name: "投标文件制作"
    flow:
      - skill: /create
        step: "1. 标书内容撰写与排版"
        output: "完整标书"
        time: "4h"
      - skill: /visual
        step: "2. 标书视觉优化（封面/目录/图表）"
        output: "视觉方案"
        time: "2h"
      - skill: /process
        step: "3. 标书检查清单（形式审查/内容审查）"
        output: "检查清单"
        time: "1h"
      - skill: /review
        step: "4. 最终评审与签章"
        output: "终审稿"
        time: "1h"
    total: "1-2天"

  - name: "述标/讲标准备"
    flow:
      - skill: /pitch
        step: "1. 述标PPT与演讲稿设计"
        output: "述标材料"
        time: "3h"
      - skill: /sales
        step: "2. 述标话术与异议应对"
        output: "话术脚本"
        time: "2h"
      - skill: /workshop
        step: "3. 述标模拟演练"
        output: "演练反馈"
        time: "2h"
      - skill: /network
        step: "4. 评委关系与情报"
        output: "评委情报"
        time: "1h"
    total: "1-2天"

  - name: "投标复盘"
    flow:
      - skill: /analyze
        step: "1. 中标/未中标原因分析"
        output: "原因分析"
        time: "2h"
      - skill: /review
        step: "2. 投标过程复盘"
        output: "复盘报告"
        time: "1h"
      - skill: /mark
        step: "3. 竞争对手情报归档"
        output: "竞争档案"
        time: "1h"
      - skill: /process
        step: "4. 标书模板优化"
        output: "模板更新"
        time: "2h"
    total: "1天"

skills:
  - /new-info
  - /quick
  - /analyze
  - /decide
  - /summary
  - /tech-compare
  - /sales
  - /user-research
  - /visual
  - /pricing
  - /modeling
  - /deal
  - /policy
  - /format
  - /process
  - /create
  - /pitch
  - /workshop
  - /network
  - /review
  - /mark
  - /monitor

output:
  - "招标机会清单"
  - "评分标准拆解"
  - "技术方案书"
  - "商务报价单"
  - "资质文件包"
  - "完整投标文件"
  - "述标PPT"
  - "投标复盘报告"
  - "竞争对手档案"
  - "标书模板库"
