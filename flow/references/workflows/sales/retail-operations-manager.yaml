---
name: retail-operations-manager
description: "零售运营经理工作流：门店→库存→促销→数据分析→定价"

daily:
  - skill: /execute
    trigger: "跟踪门店销售、库存、运营指标"
    output: "运营仪表盘"
    time: "15min"
  - skill: /monitor
    trigger: "监控库存、缺货、促销效果"
    output: "监控摘要"
    time: "10min"
  - skill: /mark
    trigger: "标记运营异常、改进点、机会"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "门店运营分析"
    flow:
      - skill: /analyze
        step: "1. 门店销售与客流分析"
        output: "销售分析"
        time: "2h"
      - skill: /analyze
        step: "2. 门店效率与坪效分析"
        output: "效率分析"
        time: "2h"
      - skill: /visual
        step: "3. 门店可视化报告"
        output: "可视化报告"
        time: "2h"
      - skill: /pitch
        step: "4. 运营汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

  - name: "库存管理"
    flow:
      - skill: /analyze
        step: "1. 库存结构与周转分析"
        output: "库存分析"
        time: "2h"
      - skill: /modeling
        step: "2. 库存预测模型"
        output: "预测模型"
        time: "2h"
      - skill: /execute
        step: "3. 库存优化执行"
        output: "优化计划"
        time: "持续"
      - skill: /review
        step: "4. 库存复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

  - name: "促销活动"
    flow:
      - skill: /analyze
        step: "1. 促销效果分析"
        output: "效果分析"
        time: "2h"
      - skill: /pricing
        step: "2. 促销定价策略"
        output: "定价策略"
        time: "2h"
      - skill: /experiment
        step: "3. 促销A/B测试"
        output: "测试结果"
        time: "2周"
      - skill: /execute
        step: "4. 促销执行"
        output: "执行计划"
        time: "持续"
    total: "持续"

  - name: "门店拓展"
    flow:
      - skill: /market-search
        step: "1. 选址市场分析"
        output: "选址分析"
        time: "2h"
      - skill: /modeling
        step: "2. 门店盈利模型"
        output: "盈利模型"
        time: "2h"
      - skill: /decide
        step: "3. 开店决策"
        output: "决策矩阵"
        time: "1h"
      - skill: /execute
        step: "4. 开店执行"
        output: "执行计划"
        time: "持续"
    total: "1-2周"

skills:
  - /execute
  - /monitor
  - /analyze
  - /visual
  - /pitch
  - /modeling
  - /review
  - /pricing
  - /experiment
  - /market-search
  - /decide
  - /mark

output:
  - "运营仪表盘"
  - "销售分析"
  - "效率分析"
  - "库存分析"
  - "预测模型"
  - "效果分析"
  - "定价策略"
  - "选址分析"
  - "盈利模型"
  - "复盘报告"
