---
name: key-account-manager
description: "大客户经理工作流：客户管理→提案→谈判→CRM→Pipeline→续约"

daily:
  - skill: /crm
    trigger: "查看大客户状态、跟进提醒、Pipeline更新"
    output: "客户状态更新"
    time: "10min"
  - skill: /new-info
    trigger: "扫描客户动态、竞品动作、行业新闻"
    output: "客户情报"
    time: "5min"
  - skill: /mark
    trigger: "标记关键决策、客户承诺、风险信号"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "客户深度洞察"
    flow:
      - skill: /user-research
        step: "1. 客户访谈与需求挖掘"
        output: "需求洞察"
        time: "2h"
      - skill: /market-search
        step: "2. 客户业务与市场分析"
        output: "客户分析"
        time: "2h"
      - skill: /analyze
        step: "3. 客户数据与消费行为分析"
        output: "数据分析"
        time: "2h"
      - skill: /network
        step: "4. 客户决策链与关系图谱"
        output: "关系图谱"
        time: "1h"
    total: "1-2天"

  - name: "客户提案"
    flow:
      - skill: /sales
        step: "1. 定制化提案设计"
        output: "提案书"
        time: "4h"
      - skill: /pricing
        step: "2. 定价与折扣策略"
        output: "价格方案"
        time: "2h"
      - skill: /tech-compare
        step: "3. 技术/方案对比"
        output: "方案对比"
        time: "2h"
      - skill: /visual
        step: "4. 提案可视化"
        output: "可视化方案"
        time: "2h"
      - skill: /pitch
        step: "5. 客户汇报设计"
        output: "汇报结构"
        time: "2h"
    total: "1-2天"

  - name: "续约管理"
    flow:
      - skill: /crm
        step: "1. 客户健康度与满意度评估"
        output: "健康度评分"
        time: "1h"
      - skill: /analyze
        step: "2. 客户价值与流失风险分析"
        output: "风险分析"
        time: "2h"
      - skill: /sales
        step: "3. 续约方案与增购提案"
        output: "续约方案"
        time: "2h"
      - skill: /network
        step: "4. 客户高层关系维护"
        output: "关系计划"
        time: "1h"
    total: "1-2天"

  - name: "客户危机处理"
    flow:
      - skill: /analyze
        step: "1. 客户投诉/问题分析"
        output: "问题分析"
        time: "1h"
      - skill: /sales
        step: "2. 危机解决方案设计"
        output: "解决方案"
        time: "2h"
      - skill: /network
        step: "3. 客户高层沟通"
        output: "沟通计划"
        time: "1h"
      - skill: /execute
        step: "4. 解决方案执行"
        output: "执行记录"
        time: "持续"
    total: "1-2天"

skills:
  - /crm
  - /user-research
  - /market-search
  - /analyze
  - /network
  - /sales
  - /pricing
  - /tech-compare
  - /visual
  - /pitch
  - /new-info
  - /mark
  - /execute

output:
  - "客户分析"
  - "需求洞察"
  - "提案书"
  - "价格方案"
  - "健康度评分"
  - "续约方案"
  - "问题分析"
  - "解决方案"
