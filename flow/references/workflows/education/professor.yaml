---
name: professor
description: "教授工作流：科研→教学→论文→项目→指导"

daily:
  - skill: /execute
    trigger: "授课、科研、指导学生"
    output: "工作日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪学术动态、文献、会议"
    output: "学术情报"
    time: "15min"
  - skill: /mark
    trigger: "标记研究灵感、学生问题、机会"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "科研项目"
    flow:
      - skill: /market-search
        step: "1. 文献综述"
        output: "文献综述"
        time: "3h"
      - skill: /analyze
        step: "2. 研究设计"
        output: "研究方案"
        time: "3h"
      - skill: /experiment
        step: "3. 实验执行"
        output: "实验记录"
        time: "持续"
      - skill: /create
        step: "4. 论文撰写"
        output: "论文草稿"
        time: "3h"
    total: "持续"

  - name: "课程教学"
    flow:
      - skill: /create
        step: "1. 课程设计"
        output: "课程设计"
        time: "2h"
      - skill: /create
        step: "2. 课件制作"
        output: "课件素材"
        time: "3h"
      - skill: /execute
        step: "3. 课堂授课"
        output: "授课记录"
        time: "持续"
      - skill: /review
        step: "4. 教学评估"
        output: "评估报告"
        time: "1h"
    total: "持续"

  - name: "论文发表"
    flow:
      - skill: /create
        step: "1. 论文写作"
        output: "论文草稿"
        time: "3h"
      - skill: /review
        step: "2. 论文修改"
        output: "修改记录"
        time: "2h"
      - skill: /execute
        step: "3. 投稿"
        output: "投稿记录"
        time: "1h"
      - skill: /review
        step: "4. 审稿回复"
        output: "回复意见"
        time: "2h"
    total: "持续"

  - name: "学生指导"
    flow:
      - skill: /interview
        step: "1. 学生沟通"
        output: "沟通记录"
        time: "2h"
      - skill: /plan
        step: "2. 指导计划"
        output: "指导计划"
        time: "1h"
      - skill: /execute
        step: "3. 指导执行"
        output: "指导记录"
        time: "持续"
      - skill: /review
        step: "4. 指导评估"
        output: "评估报告"
        time: "1h"
    total: "持续"

skills:
  - /execute
  - /new-info
  - /market-search
  - /analyze
  - /experiment
  - /create
  - /review
  - /interview
  - /plan
  - /mark

output:
  - "文献综述"
  - "研究方案"
  - "实验记录"
  - "论文草稿"
  - "课程设计"
  - "课件素材"
  - "授课记录"
  - "评估报告"
  - "修改记录"
  - "投稿记录"
  - "回复意见"
  - "沟通记录"
  - "指导计划"
