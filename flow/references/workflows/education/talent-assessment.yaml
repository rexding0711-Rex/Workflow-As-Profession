---
name: talent-assessment
description: "人才评估工作流：模型→测评→分析→反馈→发展"

daily:
  - skill: /execute
    trigger: "管理测评工具、数据分析、报告"
    output: "评估日志"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪测评进度、质量、反馈"
    output: "评估监控"
    time: "10min"
  - skill: /mark
    trigger: "标记测评问题、发现、改进"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "评估模型"
    flow:
      - skill: /analyze
        step: "1. 需求分析"
        output: "需求分析"
        time: "2h"
      - skill: /modeling
        step: "2. 模型设计"
        output: "模型设计"
        time: "3h"
      - skill: /experiment
        step: "3. 模型验证"
        output: "验证报告"
        time: "2h"
      - skill: /review
        step: "4. 模型评审"
        output: "评审意见"
        time: "1h"
    total: "2-3天"

  - name: "测评实施"
    flow:
      - skill: /plan
        step: "1. 测评计划"
        output: "测评计划"
        time: "2h"
      - skill: /execute
        step: "2. 测评执行"
        output: "测评记录"
        time: "持续"
      - skill: /monitor
        step: "3. 测评监控"
        output: "监控记录"
        time: "持续"
      - skill: /review
        step: "4. 测评复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

  - name: "数据分析"
    flow:
      - skill: /analyze
        step: "1. 数据收集"
        output: "数据收集"
        time: "2h"
      - skill: /analyze
        step: "2. 数据分析"
        output: "数据分析"
        time: "3h"
      - skill: /visual
        step: "3. 可视化"
        output: "可视化报告"
        time: "2h"
      - skill: /create
        step: "4. 分析报告"
        output: "分析报告"
        time: "2h"
    total: "1-2天"

  - name: "反馈发展"
    flow:
      - skill: /interview
        step: "1. 反馈沟通"
        output: "沟通记录"
        time: "2h"
      - skill: /create
        step: "2. 发展方案"
        output: "发展方案"
        time: "2h"
      - skill: /execute
        step: "3. 发展执行"
        output: "执行记录"
        time: "持续"
      - skill: /review
        step: "4. 效果评估"
        output: "评估报告"
        time: "1h"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /modeling
  - /experiment
  - /plan
  - /visual
  - /create
  - /interview
  - /review
  - /mark

output:
  - "需求分析"
  - "模型设计"
  - "验证报告"
  - "测评计划"
  - "测评记录"
  - "监控记录"
  - "数据收集"
  - "数据分析"
  - "可视化报告"
  - "分析报告"
  - "沟通记录"
  - "发展方案"
  - "执行记录"
  - "评估报告"
