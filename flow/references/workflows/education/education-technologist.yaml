---
name: education-technologist
description: "教育技术工作流：平台→工具→数据→培训→支持"

daily:
  - skill: /execute
    trigger: "维护平台、处理技术问题、支持用户"
    output: "技术日志"
    time: "持续"
  - skill: /monitor
    trigger: "跟踪平台性能、使用率、反馈"
    output: "平台监控"
    time: "10min"
  - skill: /mark
    trigger: "标记技术问题、需求、优化"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "平台搭建"
    flow:
      - skill: /tech-compare
        step: "1. 平台选型"
        output: "选型对比"
        time: "2h"
      - skill: /execute
        step: "2. 平台部署"
        output: "部署记录"
        time: "3h"
      - skill: /experiment
        step: "3. 平台测试"
        output: "测试报告"
        time: "2h"
      - skill: /monitor
        step: "4. 平台监控"
        output: "监控记录"
        time: "持续"
    total: "2-3天"

  - name: "工具开发"
    flow:
      - skill: /analyze
        step: "1. 工具需求分析"
        output: "需求分析"
        time: "2h"
      - skill: /design
        step: "2. 工具设计"
        output: "工具设计"
        time: "2h"
      - skill: /execute
        step: "3. 工具开发"
        output: "开发记录"
        time: "3h"
      - skill: /experiment
        step: "4. 工具测试"
        output: "测试报告"
        time: "2h"
    total: "2-3天"

  - name: "数据分析"
    flow:
      - skill: /analyze
        step: "1. 学习数据收集"
        output: "数据收集"
        time: "2h"
      - skill: /analyze
        step: "2. 学习分析"
        output: "学习分析"
        time: "2h"
      - skill: /visual
        step: "3. 数据可视化"
        output: "可视化报告"
        time: "2h"
      - skill: /pitch
        step: "4. 分析汇报"
        output: "汇报材料"
        time: "1h"
    total: "1-2天"

  - name: "教师培训"
    flow:
      - skill: /user-research
        step: "1. 教师需求"
        output: "需求调研"
        time: "2h"
      - skill: /workshop
        step: "2. 培训工作坊"
        output: "培训方案"
        time: "3h"
      - skill: /execute
        step: "3. 培训执行"
        output: "培训记录"
        time: "持续"
      - skill: /review
        step: "4. 培训评估"
        output: "评估报告"
        time: "1h"
    total: "1-2天"

skills:
  - /execute
  - /monitor
  - /tech-compare
  - /experiment
  - /analyze
  - /design
  - /visual
  - /pitch
  - /user-research
  - /workshop
  - /review
  - /mark

output:
  - "选型对比"
  - "部署记录"
  - "测试报告"
  - "需求分析"
  - "工具设计"
  - "开发记录"
  - "数据收集"
  - "学习分析"
  - "可视化报告"
  - "需求调研"
  - "培训方案"
  - "培训记录"
  - "评估报告"
