---
name: pharmacist
description: "药师工作流：处方审核→配药→发药→用药指导→药事管理"

daily:
  - skill: /execute
    trigger: "审核处方、调配药品、发药"
    output: "药学日志"
    time: "持续"
  - skill: /monitor
    trigger: "跟踪药品库存、效期、不良反应"
    output: "药学监控"
    time: "10min"
  - skill: /mark
    trigger: "标记处方问题、药物相互作用、风险"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "处方审核"
    flow:
      - skill: /analyze
        step: "1. 处方审核"
        output: "审核记录"
        time: "持续"
      - skill: /review
        step: "2. 用药适宜性"
        output: "适宜性分析"
        time: "1h"
      - skill: /execute
        step: "3. 问题处方处理"
        output: "处理记录"
        time: "持续"
    total: "持续"

  - name: "药品管理"
    flow:
      - skill: /monitor
        step: "1. 库存监控"
        output: "库存监控"
        time: "持续"
      - skill: /execute
        step: "2. 药品养护"
        output: "养护记录"
        time: "持续"
      - skill: /analyze
        step: "3. 效期管理"
        output: "效期分析"
        time: "1h"
      - skill: /execute
        step: "4. 采购计划"
        output: "采购计划"
        time: "1h"
    total: "持续"

  - name: "用药指导"
    flow:
      - skill: /interview
        step: "1. 患者咨询"
        output: "咨询记录"
        time: "持续"
      - skill: /create
        step: "2. 用药教育"
        output: "教育材料"
        time: "2h"
      - skill: /execute
        step: "3. 指导执行"
        output: "指导记录"
        time: "持续"
      - skill: /review
        step: "4. 效果评估"
        output: "评估报告"
        time: "30min"
    total: "持续"

  - name: "药事管理"
    flow:
      - skill: /policy
        step: "1. 药事法规"
        output: "法规研究"
        time: "2h"
      - skill: /process
        step: "2. 药事流程"
        output: "流程设计"
        time: "2h"
      - skill: /execute
        step: "3. 药事执行"
        output: "执行记录"
        time: "持续"
      - skill: /review
        step: "4. 药事审计"
        output: "审计报告"
        time: "1h"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /review
  - /interview
  - /create
  - /policy
  - /process
  - /mark

output:
  - "审核记录"
  - "适宜性分析"
  - "库存监控"
  - "养护记录"
  - "效期分析"
  - "采购计划"
  - "咨询记录"
  - "教育材料"
  - "指导记录"
  - "法规研究"
  - "流程设计"
  - "执行记录"
  - "审计报告"
