---
name: medical-researcher
description: "医学研究员工作流：课题→实验→数据→论文→转化"

daily:
  - skill: /execute
    trigger: "实验操作、数据记录、文献阅读"
    output: "研究日志"
    time: "持续"
  - skill: /new-info
    trigger: "跟踪文献、会议、技术动态"
    output: "研究情报"
    time: "15min"
  - skill: /mark
    trigger: "标记实验异常、灵感、问题"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "课题申报"
    flow:
      - skill: /market-search
        step: "1. 文献综述"
        output: "文献综述"
        time: "3h"
      - skill: /analyze
        step: "2. 研究设计"
        output: "研究方案"
        time: "3h"
      - skill: /create
        step: "3. 申报书撰写"
        output: "申报书"
        time: "3h"
      - skill: /review
        step: "4. 申报评审"
        output: "评审意见"
        time: "1h"
    total: "2-3天"

  - name: "实验研究"
    flow:
      - skill: /plan
        step: "1. 实验计划"
        output: "实验计划"
        time: "2h"
      - skill: /experiment
        step: "2. 实验执行"
        output: "实验记录"
        time: "持续"
      - skill: /analyze
        step: "3. 数据分析"
        output: "数据分析"
        time: "3h"
      - skill: /review
        step: "4. 实验复盘"
        output: "复盘报告"
        time: "1h"
    total: "持续"

  - name: "论文发表"
    flow:
      - skill: /create
        step: "1. 论文写作"
        output: "论文草稿"
        time: "3h"
      - skill: /review
        step: "2. 论文修改"
        output: "修改记录"
        time: "2h"
      - skill: /execute
        step: "3. 投稿"
        output: "投稿记录"
        time: "1h"
      - skill: /review
        step: "4. 审稿回复"
        output: "回复意见"
        time: "2h"
    total: "持续"

  - name: "成果转化"
    flow:
      - skill: /analyze
        step: "1. 成果评估"
        output: "评估报告"
        time: "2h"
      - skill: /market-search
        step: "2. 转化路径"
        output: "路径分析"
        time: "2h"
      - skill: /create
        step: "3. 转化方案"
        output: "转化方案"
        time: "2h"
      - skill: /execute
        step: "4. 转化执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

skills:
  - /execute
  - /new-info
  - /market-search
  - /analyze
  - /create
  - /review
  - /plan
  - /experiment
  - /mark

output:
  - "文献综述"
  - "研究方案"
  - "申报书"
  - "实验计划"
  - "实验记录"
  - "数据分析"
  - "论文草稿"
  - "修改记录"
  - "投稿记录"
  - "评估报告"
  - "路径分析"
  - "转化方案"
  - "复盘报告"
