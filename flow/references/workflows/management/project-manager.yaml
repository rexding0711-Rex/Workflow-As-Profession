---
name: project-manager
description: "项目经理工作流：启动→规划→执行→监控→收尾"

daily:
  - skill: /execute
    trigger: "推进项目、协调资源、处理问题"
    output: "项目日志"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪进度、风险、质量"
    output: "项目监控"
    time: "10min"
  - skill: /mark
    trigger: "标记风险、里程碑、问题"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "项目启动"
    flow:
      - skill: /analyze
        step: "1. 可行性分析"
        output: "可行性分析"
        time: "2h"
      - skill: /plan
        step: "2. 项目计划"
        output: "项目计划"
        time: "3h"
      - skill: /create
        step: "3. 启动文档"
        output: "启动文档"
        time: "2h"
      - skill: /review
        step: "4. 启动评审"
        output: "评审意见"
        time: "1h"
    total: "1-2天"

  - name: "项目规划"
    flow:
      - skill: /plan
        step: "1. WBS分解"
        output: "WBS"
        time: "2h"
      - skill: /plan
        step: "2. 进度计划"
        output: "进度计划"
        time: "2h"
      - skill: /plan
        step: "3. 资源计划"
        output: "资源计划"
        time: "2h"
      - skill: /plan
        step: "4. 风险计划"
        output: "风险计划"
        time: "2h"
    total: "1-2天"

  - name: "项目执行"
    flow:
      - skill: /execute
        step: "1. 任务执行"
        output: "执行记录"
        time: "持续"
      - skill: /execute
        step: "2. 变更管理"
        output: "变更记录"
        time: "持续"
      - skill: /interview
        step: "3. 干系人沟通"
        output: "沟通记录"
        time: "2h"
      - skill: /monitor
        step: "4. 质量控制"
        output: "质量记录"
        time: "持续"
    total: "持续"

  - name: "项目收尾"
    flow:
      - skill: /execute
        step: "1. 验收准备"
        output: "验收准备"
        time: "2h"
      - skill: /experiment
        step: "2. 验收测试"
        output: "验收报告"
        time: "2h"
      - skill: /create
        step: "3. 项目总结"
        output: "总结报告"
        time: "2h"
      - skill: /review
        step: "4. 项目复盘"
        output: "复盘报告"
        time: "1h"
    total: "1-2天"

skills:
  - /execute
  - /monitor
  - /analyze
  - /plan
  - /create
  - /review
  - /interview
  - /experiment
  - /mark

output:
  - "可行性分析"
  - "项目计划"
  - "启动文档"
  - "WBS"
  - "进度计划"
  - "资源计划"
  - "风险计划"
  - "执行记录"
  - "变更记录"
  - "沟通记录"
  - "质量记录"
  - "验收报告"
  - "总结报告"
