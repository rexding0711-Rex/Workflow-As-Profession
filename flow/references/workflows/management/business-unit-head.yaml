---
name: business-unit-head
description: "事业部负责人工作流：战略→业绩→资源→人才→协同"

daily:
  - skill: /execute
    trigger: "管理事业部、推进业务、协调资源"
    output: "BU日志"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪业绩、预算、团队状态"
    output: "BU监控"
    time: "15min"
  - skill: /mark
    trigger: "标记业务机会、风险、问题"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "BU战略"
    flow:
      - skill: /analyze
        step: "1. 市场分析"
        output: "市场分析"
        time: "2h"
      - skill: /create
        step: "2. BU战略"
        output: "BU战略"
        time: "3h"
      - skill: /pitch
        step: "3. 战略汇报"
        output: "汇报材料"
        time: "2h"
      - skill: /review
        step: "4. 战略评估"
        output: "评估报告"
        time: "1h"
    total: "2-3天"

  - name: "业绩管理"
    flow:
      - skill: /analyze
        step: "1. 业绩分析"
        output: "业绩分析"
        time: "2h"
      - skill: /modeling
        step: "2. 预测模型"
        output: "预测模型"
        time: "2h"
      - skill: /create
        step: "3. 改进方案"
        output: "改进方案"
        time: "2h"
      - skill: /execute
        step: "4. 方案执行"
        output: "执行记录"
        time: "持续"
    total: "持续"

  - name: "资源管理"
    flow:
      - skill: /analyze
        step: "1. 资源分析"
        output: "资源分析"
        time: "2h"
      - skill: /plan
        step: "2. 资源配置"
        output: "资源配置"
        time: "2h"
      - skill: /execute
        step: "3. 预算管理"
        output: "预算管理"
        time: "持续"
      - skill: /monitor
        step: "4. 资源监控"
        output: "监控记录"
        time: "持续"
    total: "持续"

  - name: "人才发展"
    flow:
      - skill: /analyze
        step: "1. 人才盘点"
        output: "人才盘点"
        time: "2h"
      - skill: /create
        step: "2. 发展计划"
        output: "发展计划"
        time: "2h"
      - skill: /execute
        step: "3. 团队培养"
        output: "培养记录"
        time: "持续"
      - skill: /review
        step: "4. 人才评估"
        output: "评估报告"
        time: "1h"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /analyze
  - /create
  - /pitch
  - /review
  - /modeling
  - /plan
  - /mark

output:
  - "市场分析"
  - "BU战略"
  - "汇报材料"
  - "业绩分析"
  - "预测模型"
  - "改进方案"
  - "资源分析"
  - "资源配置"
  - "预算管理"
  - "人才盘点"
  - "发展计划"
  - "培养记录"
  - "评估报告"
