---
name: digital-marketing-manager
description: "数字营销经理工作流：策略→获客→转化→留存→数据"

daily:
  - skill: /monitor
    trigger: "跟踪各渠道投放数据、转化漏斗、ROI异常"
    output: "数字营销仪表盘"
    time: "15min"
  - skill: /new-info
    trigger: "扫描数字营销趋势、平台规则变化、竞品投放"
    output: "营销情报"
    time: "10min"
  - skill: /mark
    trigger: "标记高ROI渠道、优质素材、A/B测试结果"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "数字营销策略"
    flow:
      - skill: /market-search
        step: "1. 数字渠道市场分析"
        output: "渠道分析"
        time: "2h"
      - skill: /analyze
        step: "2. 现有数字资产审计"
        output: "数字资产审计"
        time: "2h"
      - skill: /create
        step: "3. 数字营销策略方案"
        output: "策略方案"
        time: "3h"
      - skill: /plan
        step: "4. 执行路线图"
        output: "执行计划"
        time: "1h"
    total: "1-2天"

  - name: "付费获客优化"
    flow:
      - skill: /analyze
        step: "1. 各渠道CAC/ROI分析"
        output: "渠道效率分析"
        time: "2h"
      - skill: /modeling
        step: "2. 预算分配模型"
        output: "预算模型"
        time: "2h"
      - skill: /experiment
        step: "3. A/B测试设计"
        output: "测试方案"
        time: "2h"
      - skill: /review
        step: "4. 效果复盘与优化"
        output: "优化方案"
        time: "1h"
    total: "1-2天"

  - name: "转化率优化"
    flow:
      - skill: /analyze
        step: "1. 漏斗分析"
        output: "漏斗分析"
        time: "2h"
      - skill: /user-research
        step: "2. 用户行为分析"
        output: "用户洞察"
        time: "2h"
      - skill: /experiment
        step: "3. CRO实验"
        output: "实验报告"
        time: "3h"
      - skill: /execute
        step: "4. 优化落地"
        output: "执行记录"
        time: "持续"
    total: "持续"

skills:
  - /monitor
  - /new-info
  - /mark
  - /market-search
  - /analyze
  - /create
  - /plan
  - /modeling
  - /experiment
  - /review
  - /user-research
  - /execute

output:
  - "数字营销策略方案"
  - "渠道效率分析"
  - "预算分配模型"
  - "A/B测试方案"
  - "漏斗分析报告"
  - "CRO实验报告"
  - "优化执行记录"
