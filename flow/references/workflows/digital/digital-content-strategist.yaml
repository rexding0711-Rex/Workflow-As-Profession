---
name: digital-content-strategist
description: "数字内容策略师工作流：内容审计→策略→矩阵→SEO→分发→数据"

daily:
  - skill: /monitor
    trigger: "监控内容数据（阅读/互动/转化/搜索排名）"
    output: "内容仪表盘"
    time: "10min"
  - skill: /new-info
    trigger: "扫描内容趋势、搜索意图变化、平台算法更新"
    output: "内容情报"
    time: "10min"
  - skill: /mark
    trigger: "标记爆款内容特征、内容缺口、SEO机会"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "内容策略"
    flow:
      - skill: /analyze
        step: "1. 现有内容审计"
        output: "内容审计"
        time: "2h"
      - skill: /market-search
        step: "2. 受众内容需求分析"
        output: "需求分析"
        time: "2h"
      - skill: /geo
        step: "3. GEO/SEO关键词矩阵"
        output: "关键词矩阵"
        time: "2h"
      - skill: /create
        step: "4. 内容策略与编辑日历"
        output: "内容策略"
        time: "2h"
    total: "1天"
  - name: "内容生产与分发"
    flow:
      - skill: /create
        step: "1. 内容Brief与大纲"
        output: "内容Brief"
        time: "2h"
      - skill: /social-media
        step: "2. 多平台分发计划"
        output: "分发计划"
        time: "1h"
      - skill: /visual
        step: "3. 内容可视化（信息图/视频脚本）"
        output: "视觉内容"
        time: "2h"
      - skill: /review
        step: "4. 内容效果复盘"
        output: "复盘报告"
        time: "1h"
    total: "1天"

skills:
  - /monitor
  - /new-info
  - /mark
  - /analyze
  - /market-search
  - /geo
  - /create
  - /social-media
  - /visual
  - /review

output:
  - "内容审计报告"
  - "关键词矩阵"
  - "内容策略"
  - "编辑日历"
  - "内容Brief"
  - "多平台分发计划"
  - "内容复盘"