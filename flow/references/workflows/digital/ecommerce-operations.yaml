---
name: ecommerce-operations
description: "电商运营专员工作流：商品上架→价格管理→库存同步→客服→数据分析"

daily:
  - skill: /monitor
    trigger: "监控订单量/退货率/库存周转/客服响应"
    output: "运营仪表盘"
    time: "15min"
  - skill: /execute
    trigger: "处理商品上下架、价格调整、库存更新"
    output: "运营记录"
    time: "持续"
  - skill: /mark
    trigger: "标记异常订单、库存预警、客服高频问题"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "商品运营"
    flow:
      - skill: /analyze
        step: "1. 商品销售分析"
        output: "商品分析"
        time: "2h"
      - skill: /create
        step: "2. 商品详情页优化（标题/主图/描述）"
        output: "详情页优化"
        time: "2h"
      - skill: /pricing
        step: "3. 价格与促销策略"
        output: "价格策略"
        time: "1h"
      - skill: /execute
        step: "4. 批量上架与优化执行"
        output: "执行记录"
        time: "持续"
    total: "持续"
  - name: "用户体验优化"
    flow:
      - skill: /user-research
        step: "1. 购物体验痛点分析"
        output: "体验分析"
        time: "2h"
      - skill: /analyze
        step: "2. 退货与差评原因分析"
        output: "原因分析"
        time: "1h"
      - skill: /create
        step: "3. 体验优化方案"
        output: "优化方案"
        time: "2h"
      - skill: /process
        step: "4. 客服SOP优化"
        output: "客服SOP"
        time: "1h"
    total: "1天"

skills:
  - /monitor
  - /execute
  - /mark
  - /analyze
  - /create
  - /pricing
  - /user-research
  - /process

output:
  - "商品销售分析"
  - "详情页优化"
  - "价格策略"
  - "体验分析"
  - "优化方案"
  - "客服SOP"