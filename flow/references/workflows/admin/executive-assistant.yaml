---
name: executive-assistant
description: "高管助理工作流：日程→会议→差旅→文档→协调"

daily:
  - skill: /execute
    trigger: "管理日程、会议、邮件、待办"
    output: "日程管理"
    time: "15min"
  - skill: /monitor
    trigger: "跟踪会议准备、行程、紧急事项"
    output: "事务监控"
    time: "10min"
  - skill: /mark
    trigger: "标记待办、优先事项、决策点"
    output: "结构化标签"
    time: "5min"

projects:
  - name: "会议管理"
    flow:
      - skill: /plan
        step: "1. 会议安排"
        output: "会议安排"
        time: "1h"
      - skill: /meeting
        step: "2. 会议准备"
        output: "会议准备"
        time: "1h"
      - skill: /summary
        step: "3. 会议纪要"
        output: "会议纪要"
        time: "1h"
      - skill: /execute
        step: "4. 会议跟进"
        output: "跟进记录"
        time: "持续"
    total: "持续"

  - name: "差旅管理"
    flow:
      - skill: /plan
        step: "1. 行程规划"
        output: "行程规划"
        time: "1h"
      - skill: /tech-compare
        step: "2. 票务酒店比价"
        output: "比价记录"
        time: "1h"
      - skill: /execute
        step: "3. 预订执行"
        output: "预订记录"
        time: "1h"
      - skill: /execute
        step: "4. 差旅报销"
        output: "报销记录"
        time: "1h"
    total: "半天"

  - name: "文档管理"
    flow:
      - skill: /create
        step: "1. 文档起草"
        output: "文档草稿"
        time: "2h"
      - skill: /format
        step: "2. 文档排版"
        output: "排版文档"
        time: "1h"
      - skill: /review
        step: "3. 文档审核"
        output: "审核意见"
        time: "1h"
      - skill: /execute
        step: "4. 文档归档"
        output: "归档记录"
        time: "30min"
    total: "半天"

  - name: "高管协调"
    flow:
      - skill: /interview
        step: "1. 内外部沟通"
        output: "沟通记录"
        time: "2h"
      - skill: /plan
        step: "2. 协调安排"
        output: "协调安排"
        time: "1h"
      - skill: /execute
        step: "3. 执行跟进"
        output: "执行记录"
        time: "持续"
      - skill: /review
        step: "4. 效果评估"
        output: "评估报告"
        time: "30min"
    total: "持续"

skills:
  - /execute
  - /monitor
  - /plan
  - /meeting
  - /summary
  - /tech-compare
  - /create
  - /format
  - /review
  - /interview
  - /mark

output:
  - "会议安排"
  - "会议准备"
  - "会议纪要"
  - "跟进记录"
  - "行程规划"
  - "比价记录"
  - "预订记录"
  - "报销记录"
  - "文档草稿"
  - "排版文档"
  - "审核意见"
  - "归档记录"
  - "沟通记录"
  - "协调安排"
  - "评估报告"
